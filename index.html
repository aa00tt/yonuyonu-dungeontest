<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#130d18">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="N2ダンジョン">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="./manifest.json">
  <link rel="apple-touch-icon" href="./icon-dungeon.svg">
  <title>日本語単語テスト</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5e7eb;
      --shadow: 0 22px 60px rgba(15, 23, 42, 0.10);
      --blue: #4285f4;
      --green: #16a34a;
      --green-bg: #ecfdf3;
      --green-line: #a7f3c0;
      --red: #dc2626;
      --red-bg: #fef2f2;
      --red-line: #fecaca;
      --button: #f9fafb;
      --button-hover: #f3f4f6;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      touch-action: manipulation;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior: none;
    }

    button,
    textarea,
    input,
    .card,
    .quest-screen,
    .result,
    .set-selection {
      touch-action: manipulation;
    }

    button,
    .choice-button,
    .set-button,
    .primary-button,
    .quest-menu-button,
    .normal-menu-button {
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(66, 133, 244, 0.12), transparent 34rem),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", "Noto Sans KR", "Hiragino Sans", "Yu Gothic", sans-serif;
      letter-spacing: 0;
    }

    main {
      width: min(100%, 760px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 28px 18px;
      display: grid;
      place-items: center;
    }

    .card {
      position: relative;
      width: 100%;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(229, 231, 235, 0.88);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-inner {
      padding: clamp(26px, 6vw, 48px);
      padding-top: calc(env(safe-area-inset-top, 0px) + clamp(16px, 4vw, 28px));
    }

    .quest-screen,
    .result {
      padding-top: calc(env(safe-area-inset-top, 0px) + 4px);
    }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 34px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 7px 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #ffffff;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .give-up-button {
      flex: 0 0 auto;
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #ffffff;
      color: var(--muted);
      padding: 7px 13px;
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
      cursor: pointer;
      transition: background 160ms ease, transform 160ms ease, border-color 160ms ease;
    }

    .word-area {
      text-align: center;
      margin: 18px 0 30px;
    }

    .word {
      margin: 0;
      font-size: clamp(36px, 10vw, 64px);
      line-height: 1.12;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .reading {
      min-height: 32px;
      margin-top: 16px;
      color: var(--blue);
      font-size: clamp(18px, 5vw, 24px);
      font-weight: 700;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .furigana-button {
      display: block;
      margin: 0 auto 30px;
      border: 1px solid #dbe3f0;
      border-radius: 999px;
      background: #ffffff;
      color: #2563eb;
      min-height: 44px;
      padding: 10px 18px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: background 160ms ease, transform 160ms ease, border-color 160ms ease;
    }

    .furigana-button:active,
    .primary-button:active,
    .choice-button:active,
    .give-up-button:active {
      transform: scale(0.99);
    }

    .choices {
      display: grid;
      gap: 12px;
    }

    .choice-button {
      width: 100%;
      min-height: 64px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--button);
      color: var(--text);
      padding: 16px 18px;
      font-size: clamp(18px, 4.7vw, 22px);
      font-weight: 800;
      line-height: 1.35;
      text-align: left;
      cursor: pointer;
      transition: background 160ms ease, border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
      overflow-wrap: anywhere;
    }

    .choice-button:hover,
    .furigana-button:hover,
    .primary-button:hover,
    .give-up-button:hover {
      background: var(--button-hover);
    }

    .choice-button:disabled {
      cursor: default;
      opacity: 1;
    }

    .choice-button.correct {
      border-color: var(--green-line);
      background: var(--green-bg);
      color: #166534;
      box-shadow: inset 0 0 0 1px rgba(22, 163, 74, 0.18);
    }

    .choice-button.wrong {
      border-color: var(--red-line);
      background: var(--red-bg);
      color: #991b1b;
      box-shadow: inset 0 0 0 1px rgba(220, 38, 38, 0.14);
    }

    .feedback {
      min-height: 42px;
      margin: 24px 0 18px;
      font-size: clamp(18px, 4.6vw, 22px);
      font-weight: 900;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .feedback.correct {
      color: var(--green);
    }

    .feedback.wrong {
      color: var(--red);
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }

    .primary-button {
      width: 100%;
      min-height: 56px;
      border: 0;
      border-radius: 16px;
      background: #1f2937;
      color: #ffffff;
      padding: 14px 18px;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
      transition: background 160ms ease, transform 160ms ease;
    }

    .primary-button:hover {
      background: #111827;
    }

    .secondary-button {
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--text);
    }

    .secondary-button:hover {
      background: #f9fafb;
    }

    .set-selection {
      text-align: center;
    }

    .selection-copy {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 16px;
      font-weight: 800;
      line-height: 1.6;
    }

    .set-list {
      display: grid;
      gap: 12px;
      text-align: left;
    }

    .set-button {
      width: 100%;
      min-height: 62px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #ffffff;
      color: var(--text);
      padding: 15px 17px;
      font-size: clamp(16px, 4.3vw, 19px);
      font-weight: 900;
      line-height: 1.35;
      text-align: left;
      cursor: pointer;
      transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
      overflow-wrap: anywhere;
    }

    .set-button:hover {
      border-color: #dbe3f0;
      background: var(--button-hover);
    }

    .set-button:active {
      transform: scale(0.99);
    }

    .preparation-message {
      margin: 0 0 18px;
      padding: 14px 16px;
      border: 1px solid #fed7aa;
      border-radius: 16px;
      background: #fff7ed;
      color: #9a3412;
      font-size: 16px;
      font-weight: 900;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .set-title {
      margin: 0 0 18px;
      color: var(--text);
      font-size: clamp(18px, 4.8vw, 24px);
      font-weight: 900;
      line-height: 1.35;
      text-align: center;
      overflow-wrap: anywhere;
    }

    .result {
      text-align: center;
    }

    .result-title {
      margin: 0 0 18px;
      font-size: clamp(30px, 8vw, 46px);
      line-height: 1.15;
      font-weight: 900;
    }

    .score {
      margin: 0;
      font-size: clamp(24px, 7vw, 40px);
      line-height: 1.2;
      font-weight: 900;
    }

    .rate {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: clamp(18px, 5vw, 24px);
      font-weight: 800;
    }

    .result-set-title {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 16px;
      font-weight: 900;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .perfect {
      margin: 28px 0 0;
      padding: 14px 16px;
      border-radius: 16px;
      background: var(--green-bg);
      color: #166534;
      font-size: 20px;
      font-weight: 900;
    }

    .history-section {
      margin-top: 26px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      text-align: left;
    }

    .history-toggle {
      min-height: 46px;
      font-size: 15px;
    }

    .history-panel {
      margin-top: 14px;
    }

    .history-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .history-card {
      min-width: 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      line-height: 1.45;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .history-card.correct {
      border-color: var(--green-line);
      background: var(--green-bg);
    }

    .history-card.wrong {
      border-color: var(--red-line);
      background: var(--red-bg);
    }

    .history-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }

    .history-number {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .history-status {
      flex: 0 0 auto;
      padding: 3px 7px;
      border-radius: 999px;
      background: #ffffff;
      font-size: 12px;
      font-weight: 900;
      white-space: nowrap;
    }

    .history-card.correct .history-status {
      color: #166534;
    }

    .history-card.wrong .history-status {
      color: #991b1b;
    }

    .history-term {
      margin: 0;
      font-size: 16px;
      font-weight: 900;
      line-height: 1.35;
    }

    .history-furigana {
      margin: 2px 0 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .history-row {
      margin-top: 7px;
      font-size: 12px;
    }

    .history-label {
      display: block;
      color: var(--muted);
      font-weight: 800;
    }

    .history-value {
      display: block;
      margin-top: 1px;
      font-weight: 800;
    }

    .progress-track {
      width: 100%;
      height: 7px;
      background: #eef2f7;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #4285f4, #34a853, #fbbc04, #ea4335);
      transition: width 260ms ease;
    }

    [hidden] {
      display: none !important;
    }

    @media (min-width: 640px) {
      .actions {
        flex-direction: row;
      }

      .primary-button {
        flex: 1;
      }
    }

    @media (max-width: 760px) {
      .history-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .history-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 420px) {
      main {
        padding: 16px 12px;
      }

      .card {
        border-radius: 18px;
      }

      .card-inner {
        padding: 24px 18px;
      }

      .top-row {
        margin-bottom: 26px;
      }

      .choice-button {
        min-height: 60px;
        border-radius: 14px;
      }
    }

    :root {
      color-scheme: dark;
      --bg: #090b12;
      --card: #111827;
      --text: #f8fafc;
      --muted: #b6c2d4;
      --line: rgba(226, 232, 240, 0.18);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.44);
      --blue: #7dd3fc;
      --green: #6ee7b7;
      --green-bg: rgba(22, 101, 52, 0.26);
      --green-line: rgba(134, 239, 172, 0.72);
      --red: #fca5a5;
      --red-bg: rgba(127, 29, 29, 0.32);
      --red-line: rgba(248, 113, 113, 0.68);
      --button: rgba(15, 23, 42, 0.88);
      --button-hover: rgba(30, 41, 59, 0.96);
      --gold: #facc15;
      --stone: #2a3244;
      --ember: #fb923c;
    }

    body {
      background:
        linear-gradient(180deg, rgba(8, 13, 24, 0.96), rgba(4, 7, 13, 0.98)),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.05) 0 1px, transparent 1px 120px);
      color: var(--text);
    }

    main {
      width: min(100%, 1120px);
      padding: 20px 14px;
    }

    .card {
      background: rgba(15, 23, 42, 0.94);
      border-color: rgba(148, 163, 184, 0.25);
      border-radius: 8px;
    }

    .card-inner {
      padding: clamp(18px, 3vw, 34px);
    }

    .result-title {
      color: #f8fafc;
      text-shadow: 0 2px 0 rgba(0, 0, 0, 0.44);
    }

    .selection-copy,
    .result-set-title,
    .rate,
    .history-furigana,
    .history-label,
    .history-number {
      color: var(--muted);
    }

    .set-list {
      gap: 10px;
    }

    .set-button {
      position: relative;
      min-height: 66px;
      border-color: rgba(148, 163, 184, 0.28);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(51, 65, 85, 0.9), rgba(15, 23, 42, 0.96));
      color: #f8fafc;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
    }

    .set-button:hover {
      border-color: rgba(250, 204, 21, 0.68);
      background:
        linear-gradient(180deg, rgba(71, 85, 105, 0.94), rgba(30, 41, 59, 0.96));
    }

    .set-button.locked {
      cursor: default;
      opacity: 0.62;
    }

    .set-button.locked:hover {
      border-color: rgba(148, 163, 184, 0.28);
      background:
        linear-gradient(180deg, rgba(51, 65, 85, 0.68), rgba(15, 23, 42, 0.8));
    }

    .stage-button-main {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .stage-button-title {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .stage-button-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 8px;
      color: #d7deeb;
      font-size: 13px;
      font-weight: 800;
    }

    .stars {
      color: var(--gold);
      white-space: nowrap;
    }

    .lock-note {
      color: #cbd5e1;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.45;
    }

    .reset-button {
      margin-top: 12px;
      min-height: 44px;
      border-color: rgba(148, 163, 184, 0.18);
      background: rgba(15, 23, 42, 0.72);
      color: #cbd5e1;
      font-size: 14px;
    }

    .quest-screen {
      display: block;
    }

    .quest-hud {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: start;
      margin-bottom: 14px;
    }

    .hud-block {
      grid-column: 1;
      grid-row: 1;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      min-width: 0;
    }

    .hud-main {
      color: #f8fafc;
      font-size: clamp(18px, 4.8vw, 25px);
      font-weight: 900;
      line-height: 1.25;
      overflow-wrap: anywhere;
    }

    .hud-stats {
      grid-column: 1 / -1;
      grid-row: 2;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .badge,
    .give-up-button {
      border-color: rgba(148, 163, 184, 0.25);
      background: rgba(15, 23, 42, 0.9);
      color: #e2e8f0;
      border-radius: 8px;
    }

    .quest-hud .give-up-button {
      grid-column: 2;
      grid-row: 1;
      justify-self: end;
      align-self: start;
      width: auto;
    }

    .boss-badge {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 6px 10px;
      border-radius: 8px;
      background: rgba(185, 28, 28, 0.86);
      color: #fff7ed;
      font-size: 12px;
      font-weight: 1000;
      letter-spacing: 0;
    }

    .quest-arena {
      position: relative;
      min-height: clamp(300px, 50vw, 430px);
      display: grid;
      grid-template-columns: minmax(190px, 0.9fr) minmax(240px, 1fr);
      gap: clamp(12px, 3vw, 28px);
      align-items: end;
      overflow: hidden;
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 8px;
      background:
        radial-gradient(circle at 78% 26%, rgba(248, 113, 113, 0.18), transparent 22rem),
        linear-gradient(180deg, #141827 0%, #0b1020 58%, #111827 100%);
      isolation: isolate;
      padding: clamp(14px, 3vw, 24px);
    }

    .dungeon-scroll,
    .dungeon-floor {
      position: absolute;
      inset: 0;
      z-index: -2;
      opacity: 0.8;
      pointer-events: none;
    }

    .dungeon-scroll {
      background:
        repeating-linear-gradient(90deg, rgba(148, 163, 184, 0.12) 0 2px, transparent 2px 86px),
        repeating-linear-gradient(0deg, transparent 0 54px, rgba(148, 163, 184, 0.08) 54px 56px);
      animation: wall-scroll 8s linear infinite;
    }

    .dungeon-floor {
      inset: auto 0 0;
      height: 31%;
      z-index: -1;
      background:
        repeating-linear-gradient(90deg, #1f2937 0 54px, #293548 54px 108px);
      border-top: 3px solid rgba(250, 204, 21, 0.26);
      animation: floor-scroll 1.9s linear infinite;
    }

    @keyframes wall-scroll {
      from { background-position: 0 0, 0 0; }
      to { background-position: -172px 0, 0 0; }
    }

    @keyframes floor-scroll {
      from { background-position: 0 0; }
      to { background-position: -108px 0; }
    }

    .party-area {
      position: relative;
      min-height: 250px;
      display: grid;
      grid-template-columns: repeat(2, minmax(72px, 1fr));
      align-items: end;
      gap: 10px 12px;
      padding-bottom: 8px;
    }

    .hero-card {
      display: grid;
      justify-items: center;
      gap: 6px;
      min-width: 0;
      transition: transform 220ms ease, opacity 220ms ease, filter 220ms ease;
    }

    .hero-card.front {
      transform: translateY(-8px);
    }

    .hero-card.down {
      opacity: 0.42;
      filter: grayscale(0.75);
      transform: translateY(18px) rotate(-8deg);
    }

    .hero-card.hit {
      animation: hero-hit 420ms ease;
    }

    .hero-card.heal {
      animation: hero-heal 560ms ease;
    }

    @keyframes hero-hit {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      50% { transform: translateX(6px); }
      75% { transform: translateX(-3px); }
    }

    @keyframes hero-heal {
      0%, 100% { filter: drop-shadow(0 0 0 rgba(74, 222, 128, 0)); }
      45% { filter: drop-shadow(0 0 14px rgba(74, 222, 128, 0.95)); }
    }

    .stick {
      position: relative;
      width: 62px;
      height: 96px;
      animation: walk-bob 720ms ease-in-out infinite;
    }

    .stick::before {
      content: "";
      position: absolute;
      top: 5px;
      left: 20px;
      width: 22px;
      height: 22px;
      border: 3px solid currentColor;
      border-radius: 50%;
      background: rgba(15, 23, 42, 0.86);
    }

    .stick-body,
    .stick-arm,
    .stick-leg {
      position: absolute;
      left: 30px;
      width: 3px;
      border-radius: 999px;
      background: currentColor;
      transform-origin: top center;
    }

    .stick-body {
      top: 30px;
      height: 34px;
    }

    .stick-arm {
      top: 38px;
      height: 27px;
    }

    .stick-arm.left {
      transform: rotate(48deg);
    }

    .stick-arm.right {
      transform: rotate(-48deg);
    }

    .stick-leg {
      top: 62px;
      height: 29px;
      animation: leg-step 720ms ease-in-out infinite;
    }

    .stick-leg.left {
      transform: rotate(28deg);
    }

    .stick-leg.right {
      transform: rotate(-28deg);
      animation-delay: -360ms;
    }

    .weapon,
    .shield-icon,
    .staff-icon {
      position: absolute;
      pointer-events: none;
    }

    .weapon {
      top: 36px;
      right: 2px;
      width: 4px;
      height: 38px;
      border-radius: 999px;
      background: #dbeafe;
      transform: rotate(45deg);
      box-shadow: 0 -7px 0 #f8fafc;
    }

    .shield-icon {
      top: 43px;
      left: 6px;
      width: 20px;
      height: 26px;

      box-shadow: inset 0 -7px 0 rgba(15, 23, 42, 0.25);

    .unit-shield .stick::after {

      top: 28px;

      height: 30px;

    .unit-shield .shield-icon {

      width: 28px;
      height: 36px;
      border-color: #e2e8f0;

        linear-gradient(90deg, transparent 0 43%, rgba(255, 255, 255, 0.55) 44% 56%, transparent 57%),

    .enemy-panel.defeated {

    @keyframes enemy-hit {
      0%, 100% { filter: none; transform: translateX(0); }

      68% { transform: translateX(-5px); }

    @keyframes enemy-attack {
      0%, 100% { transform: translateX(0); }

    .monster {
      position: relative;
      width: 96px;
      height: 96px;
    }

    .monster::before,
    .monster::after {
      content: "";
      position: absolute;
      background: currentColor;
    }

    .monster.slime {
      color: #38bdf8;
      width: 96px;
      height: 70px;
      border-radius: 54% 54% 42% 42%;
      background: currentColor;
      box-shadow: inset -12px -14px 0 rgba(2, 6, 23, 0.2), 0 12px 22px rgba(56, 189, 248, 0.18);
      animation: slime-wobble 1.8s ease-in-out infinite;
    }

    .monster.slime::before,
    .monster.slime::after {
      top: 28px;
      width: 9px;
      height: 12px;
      border-radius: 50%;
      background: #0f172a;
    }

    .monster.slime::before { left: 30px; }
    .monster.slime::after { right: 30px; }

    .monster.bat {
      color: #a78bfa;
      animation: bat-hover 1.2s ease-in-out infinite;
    }

    .monster.bat::before {
      top: 30px;
      left: 34px;
      width: 28px;
      height: 34px;
      border-radius: 50% 50% 45% 45%;
      background: currentColor;
    }

    .monster.bat::after {
      top: 24px;
      left: 4px;
      width: 88px;
      height: 44px;
      background:
        radial-gradient(circle at 30% 76%, transparent 0 18px, currentColor 19px),
        radial-gradient(circle at 70% 76%, transparent 0 18px, currentColor 19px);
      clip-path: polygon(0 50%, 24% 0, 48% 50%, 52% 50%, 76% 0, 100% 50%, 72% 70%, 50% 55%, 28% 70%);
      animation: bat-wings 520ms ease-in-out infinite;
    }

    .monster.goblin {
      color: #84cc16;
      width: 92px;
      height: 88px;
      border-radius: 44% 44% 48% 48%;
      background: currentColor;
      box-shadow: inset -10px -12px 0 rgba(2, 6, 23, 0.18);
    }

    .monster.goblin::before,
    .monster.goblin::after {
      top: 24px;
      width: 24px;
      height: 18px;
      background: currentColor;
      clip-path: polygon(0 50%, 100% 0, 100% 100%);
    }

    .monster.goblin::before {
      left: -18px;
    }

    .monster.goblin::after {
      right: -18px;
      transform: scaleX(-1);
    }

    .monster.goblin {
      background:
        radial-gradient(circle at 33% 34%, #ef4444 0 5px, transparent 6px),
        radial-gradient(circle at 66% 34%, #ef4444 0 5px, transparent 6px),
        currentColor;
    }

    .monster.goblin::after {
      box-shadow: 28px 34px 0 -7px #7c2d12;
    }

    .monster.skeleton {
      color: #e5e7eb;
      width: 86px;
      height: 96px;
      filter: drop-shadow(0 0 10px rgba(147, 197, 253, 0.22));
    }

    .monster.skeleton::before {
      top: 3px;
      left: 20px;
      width: 46px;
      height: 42px;
      border-radius: 42% 42% 48% 48%;
      background: currentColor;
      box-shadow: 0 46px 0 -8px currentColor;
    }

    .monster.skeleton::after {
      top: 20px;
      left: 31px;
      width: 8px;
      height: 9px;
      border-radius: 50%;
      background: #0f172a;
      box-shadow: 18px 0 0 #0f172a, 9px 18px 0 -2px #0f172a;
    }

    .monster.skeleton::after {
      background: #93c5fd;
      box-shadow: 18px 0 0 #93c5fd, 9px 18px 0 -2px #0f172a;
    }

    .monster.demon,
    .monster.awakened {
      color: #ef4444;
      width: 108px;
      height: 104px;
      border-radius: 42% 42% 48% 48%;
      background: currentColor;
      box-shadow: inset -14px -18px 0 rgba(2, 6, 23, 0.24), 0 0 28px rgba(239, 68, 68, 0.28);
      animation: demon-aura 1.5s ease-in-out infinite;
    }

    .monster.awakened {
      color: #f97316;
      box-shadow: inset -14px -18px 0 rgba(2, 6, 23, 0.24), 0 0 36px rgba(251, 146, 60, 0.5);
      animation: awakened-float 1.2s ease-in-out infinite;
    }

    .monster.demon::before,
    .monster.awakened::before {
      top: -18px;
      left: 10px;
      width: 88px;
      height: 38px;
      background: currentColor;
      clip-path: polygon(0 100%, 16% 0, 36% 82%, 64% 82%, 84% 0, 100% 100%);
    }

    .monster.demon::after,
    .monster.awakened::after {
      top: 37px;
      left: 32px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #fff7ed;
      box-shadow: 32px 0 0 #fff7ed, 16px 31px 0 -4px #0f172a;
    }

    @keyframes slime-wobble {
      0%, 100% { transform: scale(1, 1); }
      50% { transform: scale(1.06, 0.94) translateY(3px); }
    }

    @keyframes bat-hover {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes bat-wings {
      0%, 100% { transform: scaleY(1); }
      50% { transform: scaleY(0.74); }
    }

    @keyframes demon-aura {
      0%, 100% { filter: drop-shadow(0 0 14px rgba(127, 29, 29, 0.46)); }
      50% { filter: drop-shadow(0 0 24px rgba(168, 85, 247, 0.42)); }
    }

    @keyframes awakened-float {
      0%, 100% { transform: translateY(0); filter: drop-shadow(0 0 18px rgba(249, 115, 22, 0.48)); }
      50% { transform: translateY(-7px); filter: drop-shadow(0 0 28px rgba(168, 85, 247, 0.55)); }
    }

    .enemy-hp {
      width: min(100%, 190px);
      height: 11px;
    }

    .enemy-hp .hp-fill {
      background: linear-gradient(90deg, #ef4444, #f97316, #facc15);
    }

    .choices {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }

    .choice-button {
      min-height: 68px;
      border-color: rgba(148, 163, 184, 0.28);
      border-radius: 8px;
      background:
        linear-gradient(180deg, rgba(30, 41, 59, 0.94), rgba(15, 23, 42, 0.96));
      color: #f8fafc;
      font-size: clamp(16px, 3vw, 20px);
      overflow-wrap: anywhere;
      word-break: keep-all;
    }

    .choice-button:hover {
      border-color: rgba(125, 211, 252, 0.62);
      background:
        linear-gradient(180deg, rgba(51, 65, 85, 0.96), rgba(30, 41, 59, 0.98));
    }

    .choice-button.wrong-flash {
      animation: wrong-flash 360ms ease;
    }

    @keyframes wrong-flash {
      0%, 100% { background: var(--button); }
      45% { background: rgba(127, 29, 29, 0.82); }
    }

    .feedback {
      min-height: 34px;
      margin: 12px 0 8px;
      color: #e2e8f0;
      font-size: clamp(16px, 3.6vw, 20px);
      text-align: center;
    }

    .primary-button {
      border-radius: 8px;
      background: linear-gradient(180deg, #f59e0b, #b45309);
      color: #111827;
    }

    .primary-button:hover {
      background: linear-gradient(180deg, #fbbf24, #d97706);
    }

    .secondary-button {
      border-color: rgba(148, 163, 184, 0.28);
      background: rgba(15, 23, 42, 0.9);
      color: #e2e8f0;
    }

    .secondary-button:hover {
      background: rgba(30, 41, 59, 0.96);
    }

    .result-details {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin: 20px 0;
      text-align: left;
    }

    .result-stat,
    .unlock-item {
      min-width: 0;
      padding: 11px 12px;
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.74);
      overflow-wrap: anywhere;
    }

    .result-stat-label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .result-stat-value {
      display: block;
      margin-top: 3px;
      color: #f8fafc;
      font-size: 17px;
      font-weight: 1000;
    }

    .unlock-list {
      display: grid;
      gap: 8px;
      margin: 0 0 20px;
      color: #fef3c7;
      font-weight: 900;
      text-align: left;
    }

    .perfect {
      border-radius: 8px;
      border: 1px solid rgba(134, 239, 172, 0.42);
    }

    .history-card {
      border-color: rgba(148, 163, 184, 0.24);
      border-radius: 8px;
      background: rgba(15, 23, 42, 0.72);
    }

    .history-status {
      background: rgba(2, 6, 23, 0.74);
    }

    .effect-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 4;
    }

    .slash-effect,
    .magic-effect,
    .staff-effect,
    .holy-effect,
    .shield-effect,
    .guard-effect,
    .enemy-strike-effect,
    .heal-effect {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .slash-effect {
      left: var(--to-x, 72%);
      top: var(--to-y, 58%);
      width: 128px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, #fff7d6 22%, #ffffff 50%, #f0b84a 76%, transparent);
      box-shadow: 0 0 20px rgba(250, 204, 21, 0.96), 0 0 34px rgba(248, 113, 113, 0.36);
      animation: slash 420ms ease;
    }

    .slash-effect::after {
      content: "";
      position: absolute;
      inset: -11px 20px;
      border-radius: 50%;
      border: 2px solid rgba(255, 242, 194, 0.72);
      transform: rotate(28deg);
    }

    .magic-effect {
      left: var(--from-x, 28%);
      top: var(--from-y, 58%);
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 38% 34%, #ffffff 0 16%, #d8b4fe 17% 38%, #7c3aed 39% 70%, transparent 72%);
      box-shadow: -18px 0 22px rgba(124, 58, 237, 0.42), 0 0 20px rgba(216, 180, 254, 0.9);
      animation: magic-shot 640ms ease-out;
    }

    .magic-effect::before {
      content: "";
      position: absolute;
      right: 16px;
      top: 8px;
      width: 58px;
      height: 8px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(124, 58, 237, 0.8), rgba(216, 180, 254, 0.55));
      filter: blur(1px);
    }

    .magic-effect::after {
      content: "";
      position: absolute;
      left: -17px;
      top: -19px;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      border: 2px solid rgba(216, 180, 254, 0.76);
      background: radial-gradient(circle, rgba(196, 181, 253, 0.45), transparent 62%);
      transform: scale(0.2);
      animation: magic-burst 640ms ease-out;
    }

    .staff-effect {
      left: var(--to-x, 72%);
      top: var(--to-y, 60%);
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 3px solid rgba(255, 225, 160, 0.86);
      background:
        radial-gradient(circle, rgba(255, 244, 210, 0.72), transparent 52%),
        conic-gradient(from 18deg, transparent 0 18%, rgba(246, 180, 75, 0.85) 18% 24%, transparent 24% 48%, rgba(246, 180, 75, 0.8) 48% 54%, transparent 54% 100%);
      box-shadow: 0 0 18px rgba(251, 191, 36, 0.56);
      animation: staff-hit 430ms ease;
    }

    .holy-effect {
      left: var(--to-x, 72%);
      top: var(--to-y, 60%);
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid rgba(255, 245, 196, 0.9);
      background:
        linear-gradient(90deg, transparent 43%, rgba(255, 250, 217, 0.9) 43% 57%, transparent 57%),
        linear-gradient(0deg, transparent 38%, rgba(255, 250, 217, 0.88) 38% 52%, transparent 52%),
        radial-gradient(circle, rgba(255, 250, 214, 0.66), transparent 62%);
      box-shadow: 0 0 22px rgba(250, 204, 21, 0.6), 0 0 38px rgba(187, 247, 208, 0.34);
      animation: holy-burst 560ms ease-out;
    }

    .shield-effect {
      left: var(--to-x, 72%);
      top: var(--to-y, 58%);
      width: 82px;
      height: 82px;
      border-radius: 50%;
      border: 3px solid rgba(255, 231, 166, 0.8);
      background:
        radial-gradient(circle, rgba(255, 247, 215, 0.55), transparent 48%),
        repeating-conic-gradient(from 0deg, rgba(244, 196, 92, 0.82) 0 9deg, transparent 9deg 22deg);
      box-shadow: 0 0 24px rgba(249, 115, 22, 0.46);
      animation: shield-impact 520ms ease;
    }

    .guard-effect {
      left: var(--mid-x, 42%);
      top: var(--mid-y, 58%);
      width: 98px;
      height: 124px;
      border-radius: 48% 48% 36% 36%;
      border: 3px solid rgba(255, 231, 166, 0.86);
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.04), rgba(255, 218, 126, 0.26), rgba(255, 255, 255, 0.06)),
        radial-gradient(circle at 50% 45%, rgba(255, 246, 205, 0.42), transparent 64%);
      box-shadow: 0 0 24px rgba(250, 204, 21, 0.62), inset 0 0 20px rgba(255, 247, 214, 0.18);
      animation: guard-wall 650ms ease;
    }

    .guard-effect::after {
      content: "";
      position: absolute;
      right: -22px;
      top: 38px;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.78);
      animation: guard-spark 650ms ease;
    }

    .enemy-strike-effect {
      left: var(--from-x, 72%);
      top: var(--from-y, 58%);
      width: 104px;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(270deg, rgba(255, 124, 83, 0.96), rgba(159, 18, 57, 0.72), transparent);
      box-shadow: 0 0 18px rgba(248, 113, 113, 0.54);
      animation: enemy-strike 470ms ease-out;
    }

    .heal-effect {
      left: var(--to-x, 22%);
      top: var(--to-y, 64%);
      width: 90px;
      height: 74px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 50% 46%, rgba(236, 253, 245, 0.68), transparent 13%),
        radial-gradient(circle, rgba(74, 222, 128, 0.48), transparent 65%);
      box-shadow: 0 0 24px rgba(74, 222, 128, 0.44);
      animation: heal-pulse 680ms ease;
    }

    .heal-effect::before,
    .heal-effect::after {
      content: "+";
      position: absolute;
      color: #bbf7d0;
      font-size: 26px;
      font-weight: 1000;
      text-shadow: 0 0 12px rgba(74, 222, 128, 0.82);
      animation: heal-mark 680ms ease;
    }

    .heal-effect::before {
      left: 26px;
      top: 18px;
    }

    .heal-effect::after {
      right: 28px;
      top: 8px;
      animation-delay: 80ms;
    }

    @keyframes slash {
      0% { opacity: 0; transform: translate(-72%, -50%) rotate(-28deg) scaleX(0.2); }
      40% { opacity: 1; }
      100% { opacity: 0; transform: translate(-36%, -50%) rotate(-28deg) scaleX(1.1); }
    }

    @keyframes magic-shot {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.75); }
      18% { opacity: 1; }
      72% { opacity: 1; transform: translate(calc(var(--move-x, 240px) - 50%), calc(var(--move-y, 0px) - 50%)) scale(1); }
      100% { opacity: 0; transform: translate(calc(var(--move-x, 240px) - 50%), calc(var(--move-y, 0px) - 50%)) scale(0.2); }
    }

    @keyframes magic-burst {
      0%, 60% { opacity: 0; transform: scale(0.2); }
      78% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.45); }
    }

    @keyframes staff-hit {
      0% { opacity: 0; transform: translate(-86%, -18%) scale(0.35); }
      38% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-28%, -66%) scale(1.24); }
    }

    @keyframes holy-burst {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.38) rotate(-16deg); }
      35% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.45) rotate(18deg); }
    }

    @keyframes shield-impact {
      0% { opacity: 0; transform: translate(-86%, -50%) scale(0.4); }
      42% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-32%, -50%) scale(1.42); }
    }

    @keyframes guard-wall {
      0% { opacity: 0; transform: translate(-50%, -50%) translateX(18px) scaleX(0.48); }
      28% { opacity: 1; transform: translate(-50%, -50%) translateX(0) scaleX(1); }
      74% { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, -50%) translateX(-8px) scaleX(0.82); }
    }

    @keyframes guard-spark {
      0%, 28% { opacity: 0; transform: scale(0.2); }
      46% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.65); }
    }

    @keyframes enemy-strike {
      0% { opacity: 0; transform: translate(-50%, -50%) scaleX(0.25); }
      30% { opacity: 1; }
      100% { opacity: 0; transform: translate(calc(var(--move-x, -240px) - 50%), calc(var(--move-y, 0px) - 50%)) scaleX(1); }
    }

    @keyframes heal-pulse {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
      45% { opacity: 1; }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.15); }
    }

    @keyframes heal-mark {
      0% { opacity: 0; transform: translateY(12px) scale(0.6); }
      42% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-22px) scale(1.08); }
    }

    .hero-card.attack-hero {
      animation: hero-slash-lunge 620ms ease;
    }

    .hero-card.attack-hero .weapon {
      animation: weapon-slash 620ms ease;
    }

    .hero-card.attack-mage {
      animation: mage-cast 620ms ease;
    }

    .hero-card.attack-mage .stick-arm.right {
      animation: cast-arm 620ms ease;
    }

    .hero-card.attack-healer {
      animation: healer-bonk 540ms ease;
    }

    .hero-card.attack-healer .stick-arm.right {
      animation: staff-swing 540ms ease;
    }

    .hero-card.attack-shield {
      animation: shield-charge 620ms ease;
    }

    .hero-card.attack-shield .shield-icon,
    .hero-card.guard .shield-icon {
      animation: shield-flare 620ms ease;
    }

    .hero-card.heal-cast {
      animation: healer-pray 680ms ease;
    }

    .hero-card.heal-cast .stick-arm.left {
      animation: prayer-left 680ms ease;
    }

    .hero-card.heal-cast .stick-arm.right {
      animation: prayer-right 680ms ease;
    }

    .hero-card.guard {
      animation: shield-cover 650ms ease;
    }

    .hero-card.guarded {
      animation: guarded-glow 650ms ease;
    }

    @keyframes hero-slash-lunge {
      0%, 100% { transform: translateX(0); }
      34% { transform: translateX(32px); filter: drop-shadow(0 0 12px rgba(250, 204, 21, 0.6)); }
      48% { transform: translateX(42px) translateY(-3px); }
      72% { transform: translateX(14px); }
    }

    @keyframes weapon-slash {
      0%, 100% { transform: rotate(45deg); }
      36% { transform: rotate(95deg) translateY(-7px); }
      56% { transform: rotate(-38deg) translateY(-5px); }
    }

    @keyframes mage-cast {
      0%, 100% { filter: none; transform: translateX(0); }
      35% { filter: drop-shadow(0 0 16px rgba(167, 139, 250, 0.88)); transform: translateY(-4px); }
      58% { filter: drop-shadow(0 0 22px rgba(216, 180, 254, 0.95)); }
    }

    @keyframes cast-arm {
      0%, 100% { transform: rotate(-48deg); }
      38%, 62% { transform: rotate(-102deg); }
    }

    @keyframes healer-bonk {
      0%, 100% { transform: translateX(0); }
      38% { transform: translateX(23px); filter: drop-shadow(0 0 10px rgba(187, 247, 208, 0.5)); }
      54% { transform: translateX(30px) translateY(2px); }
    }

    @keyframes staff-swing {
      0%, 100% { transform: rotate(-48deg); }
      45% { transform: rotate(38deg); }
      62% { transform: rotate(-76deg); }
    }

    @keyframes shield-charge {
      0%, 100% { transform: translateX(0); }
      18% { transform: translateX(5px); }
      46% { transform: translateX(36px); filter: drop-shadow(0 0 12px rgba(251, 191, 36, 0.66)); }
      68% { transform: translateX(16px); }
    }

    @keyframes shield-flare {
      0%, 100% { box-shadow: none; transform: translateX(0); }
      42%, 62% { box-shadow: 0 0 18px rgba(255, 239, 184, 0.85); transform: translateX(4px) scale(1.08); }
    }

    @keyframes healer-pray {
      0%, 100% { filter: none; transform: translateY(0); }
      34%, 72% { filter: drop-shadow(0 0 18px rgba(74, 222, 128, 0.9)); transform: translateY(-5px); }
    }

    @keyframes prayer-left {
      0%, 100% { transform: rotate(48deg); }
      35%, 72% { transform: rotate(10deg) translateX(4px); }
    }

    @keyframes prayer-right {
      0%, 100% { transform: rotate(-48deg); }
      35%, 72% { transform: rotate(-10deg) translateX(-4px); }
    }

    @keyframes shield-cover {
      0%, 100% { transform: translateX(0); }
      24% { transform: translateX(45px); filter: drop-shadow(0 0 14px rgba(250, 204, 21, 0.7)); }
      70% { transform: translateX(45px); filter: drop-shadow(0 0 22px rgba(255, 247, 205, 0.84)); }
    }

    @keyframes guarded-glow {
      0%, 100% { filter: none; }
      38%, 70% { filter: drop-shadow(0 0 14px rgba(255, 247, 205, 0.75)); }
    }

    .progress-track {
      background: rgba(2, 6, 23, 0.92);
    }

    .progress-fill {
      background: linear-gradient(90deg, #f59e0b, #ef4444, #7c3aed);
    }

    @media (max-width: 780px) {
      .quest-arena {
        grid-template-columns: 1fr;
        min-height: 560px;
        align-items: stretch;
      }

        order: 2;
        min-height: 205px;
      }

      }

      .result-details {

      }
    }

    :root {

      --red: #ff9b78;

        radial-gradient(circle at 18% 16%, rgba(205, 88, 37, 0.23), transparent 13rem),

        radial-gradient(circle at 50% 110%, rgba(92, 54, 27, 0.26), transparent 28rem),

      content: "";

      inset: 0;
      pointer-events: none;

    body::before {
      opacity: 0.34;
      background:
        repeating-linear-gradient(115deg, rgba(255, 229, 174, 0.035) 0 1px, transparent 1px 78px),
        repeating-linear-gradient(17deg, rgba(0, 0, 0, 0.2) 0 2px, transparent 2px 118px);
      mix-blend-mode: screen;
    }

    body::after {
      background:
        radial-gradient(circle at 10% 18%, rgba(236, 132, 45, 0.28), transparent 8rem),
        radial-gradient(circle at 90% 20%, rgba(236, 132, 45, 0.2), transparent 7rem),
        radial-gradient(circle at center, transparent 28%, rgba(0, 0, 0, 0.58) 100%);

      z-index: 1;

    .card {

        linear-gradient(180deg, rgba(41, 30, 26, 0.96), rgba(18, 13, 13, 0.98)),
