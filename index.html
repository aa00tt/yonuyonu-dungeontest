    function shuffle(items) {
      const copied = items.slice();
      for (let i = copied.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copied[i], copied[j]] = [copied[j], copied[i]];
      }
      return copied;
    }

    function uniqueValues(items) {
      return [...new Set(items.filter(Boolean))];
    }

    function buildAutoOptions(question, sourceQuestions) {
      const sameSetAnswers = uniqueValues(sourceQuestions.map((item) => item.answer));
      const fallbackAnswers = uniqueValues(
        Object.values(quizSets).flatMap((set) => set.questions.map((item) => item.answer))
      );
      const distractors = uniqueValues([...sameSetAnswers, ...fallbackAnswers])
        .filter((answer) => answer !== question.answer);

      return shuffle([question.answer, ...shuffle(distractors).slice(0, 3)]);
    }

    function prepareQuestions(sourceQuestions) {
      return sourceQuestions.map((question) => {
        if (Array.isArray(question.options) && question.options.length === 4 && question.options.includes(question.answer)) {
          return { ...question, options: question.options.slice() };
        }

        return {
          ...question,
          options: buildAutoOptions(question, sourceQuestions)
        };
      });
    }

    function getAllQuestions() {
      return stageKeys.flatMap((setKey) => quizSets[setKey].questions);
    }

    function clampSetting(value, fallback) {
      const numericValue = Number(value);
      if (!Number.isFinite(numericValue)) {
        return fallback;
      }
      return Math.max(0, Math.min(10, Math.round(numericValue)));
    }

    function createDefaultState() {
      const stages = {};
      stageKeys.forEach((key) => {
        stages[key] = {
          clear: { easy: false, normal: false, hard: false },
          noMiss: { easy: false, normal: false, hard: false },
          bonusStars: 0
        };
      });

      return {
        totalExp: 0,
        totalGold: 0,
        currentLevel: 1,
        stages,
        all: {
          clear: { "20": false, "30": false, "50": false },
          noMiss: { "20": false, "30": false, "50": false },
          bonusStars: 0
        },
        awakening: {
          clear: { easy: false, normal: false, hard: false }
        },
        settings: {
          bgmVolume: 5,
          sfxVolume: 6,
          soundEnabled: true,
          normalSettingsTab: "music",
          questSettingsTab: "music"
        }
      };
    }

    function normalizeGameState(saved) {
      const base = createDefaultState();
      if (!saved || typeof saved !== "object") {
        return base;
      }

      base.totalExp = Math.max(0, Number(saved.totalExp) || 0);
      base.totalGold = Math.max(0, Number(saved.totalGold) || 0);
      stageKeys.forEach((key) => {
        const stage = saved.stages && saved.stages[key] ? saved.stages[key] : {};
        difficultyOrder.forEach((difficulty) => {
          base.stages[key].clear[difficulty] = Boolean(stage.clear && stage.clear[difficulty]);
          base.stages[key].noMiss[difficulty] = Boolean(stage.noMiss && stage.noMiss[difficulty]);
        });
        base.stages[key].bonusStars = Math.min(2, Math.max(0, Number(stage.bonusStars) || 0));
      });

      ["20", "30", "50"].forEach((mode) => {
        base.all.clear[mode] = Boolean(saved.all && saved.all.clear && saved.all.clear[mode]);
        base.all.noMiss[mode] = Boolean(saved.all && saved.all.noMiss && saved.all.noMiss[mode]);
      });
      base.all.bonusStars = Math.min(2, Math.max(0, Number(saved.all && saved.all.bonusStars) || 0));

      difficultyOrder.forEach((difficulty) => {
        base.awakening.clear[difficulty] = Boolean(
          saved.awakening && saved.awakening.clear && saved.awakening.clear[difficulty]
        );
      });
      const savedSettings = saved.settings && typeof saved.settings === "object" ? saved.settings : {};
      base.settings = {
        bgmVolume: clampSetting(savedSettings.bgmVolume, 5),
        sfxVolume: clampSetting(savedSettings.sfxVolume, 6),
        soundEnabled: typeof savedSettings.soundEnabled === "boolean" ? savedSettings.soundEnabled : true,
        normalSettingsTab: savedSettings.normalSettingsTab === "other" ? "other" : "music",
        questSettingsTab: savedSettings.questSettingsTab === "other" ? "other" : "music"
      };
      base.currentLevel = getLevelInfo(base.totalExp).level;
      return base;
    }

    function loadGameState() {
      const saved = readStorageJson(progressStorageKey);
      if (saved) {
        return normalizeGameState(saved);
      }

      const legacySaved = readStorageJson(legacyStorageKey);
      if (legacySaved) {
        const migrated = normalizeGameState(legacySaved);
        try {
          localStorage.setItem(progressStorageKey, JSON.stringify(migrated));
        } catch (error) {
          console.warn("進行度の移行保存に失敗しました", error);
        }
        return migrated;
      }

      return createDefaultState();
    }

    function readStorageJson(key) {
      try {
        const raw = localStorage.getItem(key);
        return raw ? JSON.parse(raw) : null;
      } catch (error) {
        return null;
      }
    }

    function saveGameState() {
      gameState.currentLevel = getLevelInfo(gameState.totalExp).level;
      try {
        localStorage.setItem(progressStorageKey, JSON.stringify(gameState));
      } catch (error) {
        console.warn("進行度の保存に失敗しました", error);
      }
    }

    function ensureSoundSettings() {
      const settings = gameState.settings && typeof gameState.settings === "object" ? gameState.settings : {};
      gameState.settings = {
        bgmVolume: clampSetting(settings.bgmVolume, 5),
        sfxVolume: clampSetting(settings.sfxVolume, 6),
        soundEnabled: typeof settings.soundEnabled === "boolean" ? settings.soundEnabled : true,
        normalSettingsTab: settings.normalSettingsTab === "other" ? "other" : "music",
        questSettingsTab: settings.questSettingsTab === "other" ? "other" : "music"
      };
      return gameState.settings;
    }

    function syncSoundControls() {
      const settings = ensureSoundSettings();
      [normalBgmVolume, questBgmVolume].forEach((control) => {
        if (control && document.activeElement !== control) {
          control.value = String(settings.bgmVolume);
        }
      });
      [normalSfxVolume, questSfxVolume].forEach((control) => {
        if (control && document.activeElement !== control) {
          control.value = String(settings.sfxVolume);
        }
      });
      [normalSoundToggle, questSoundToggle].forEach((button) => {
        if (!button) {
          return;
        }
        button.textContent = settings.soundEnabled ? "全サウンド ON" : "全サウンド OFF";
        button.setAttribute("aria-pressed", String(settings.soundEnabled));
      });

      settingsTabButtons.forEach((button) => {
        const scope = button.dataset.settingsScope;
        const tab = button.dataset.settingsTab;
        const activeTab = scope === "quest" ? settings.questSettingsTab : settings.normalSettingsTab;
        const isActive = tab === activeTab;
        button.classList.toggle("active", isActive);
        button.setAttribute("aria-selected", String(isActive));
      });

      normalMusicPane.hidden = settings.normalSettingsTab !== "music";
      normalOtherPane.hidden = settings.normalSettingsTab !== "other";
      questMusicPane.hidden = settings.questSettingsTab !== "music";
      questOtherPane.hidden = settings.questSettingsTab !== "other";
    }

    function updateSettingsTab(scope, tab) {
      const settings = ensureSoundSettings();
      if (!["music", "other"].includes(tab)) {
        return;
      }
      if (scope === "quest") {
        settings.questSettingsTab = tab;
      } else {
        settings.normalSettingsTab = tab;
      }
      saveGameState();
      syncSoundControls();
      playSfx("settings");
    }

    function updateSoundVolume(key, value) {
      const settings = ensureSoundSettings();
      settings[key] = clampSetting(value, key === "bgmVolume" ? 5 : 6);
      saveGameState();
      syncSoundControls();
      applySoundSettings();
    }

    function toggleSoundEnabled() {
      const settings = ensureSoundSettings();
      settings.soundEnabled = !settings.soundEnabled;
      saveGameState();
      syncSoundControls();
      applySoundSettings();
      if (settings.soundEnabled) {
        playSfx("settings");
      }
    }

    function getAudioContext() {
      if (audioContext) {
        return audioContext;
      }
      const AudioContextClass = window.AudioContext || window.webkitAudioContext;
      if (!AudioContextClass) {
        return null;
      }
      try {
        audioContext = new AudioContextClass();
      } catch (error) {
        audioContext = null;
      }
      return audioContext;
    }

    function unlockAudio() {
      if (audioUnlocked) {
        return;
      }
      const context = getAudioContext();
      if (!context) {
        return;
      }
      audioUnlocked = true;
      if (context.state === "suspended" && context.resume) {
        context.resume().catch(() => {});
      }
      startBgm(currentBgmScene);
    }

    function getBgmVolume() {
      const settings = ensureSoundSettings();
      return settings.soundEnabled ? settings.bgmVolume / 10 : 0;
    }

    function getSfxVolume() {
      const settings = ensureSoundSettings();
      return settings.soundEnabled ? settings.sfxVolume / 10 : 0;
    }

    function applySoundSettings() {
      if (!audioUnlocked) {
        return;
      }
      if (getBgmVolume() <= 0) {
        stopBgm();
        return;
      }
      restartBgm();
    }

    function setBgmScene(scene) {
      const nextScene = bgmPatterns[scene] ? scene : "selection";
      if (currentBgmScene === nextScene && bgmTimer) {
        return;
      }
      currentBgmScene = nextScene;
      if (audioUnlocked) {
        restartBgm();
      }
    }

    function startBgm(scene = currentBgmScene) {
      stopBgm();
      const pattern = bgmPatterns[scene] || bgmPatterns.selection;
      if (!audioUnlocked || getBgmVolume() <= 0 || !getAudioContext()) {
        return;
      }
      bgmStep = 0;
      playBgmStep(pattern);
      bgmTimer = window.setInterval(() => playBgmStep(pattern), pattern.interval);
    }

    function stopBgm() {
      if (bgmTimer) {
        window.clearInterval(bgmTimer);
        bgmTimer = null;
      }
    }

    function restartBgm() {
      startBgm(currentBgmScene);
    }

    function playBgmStep(pattern) {
      if (document.hidden || getBgmVolume() <= 0) {
        return;
      }
      const note = pattern.notes[bgmStep % pattern.notes.length];
      bgmStep += 1;
      const volume = getBgmVolume();
      const baseGain = pattern.gain * volume;
      const duration = Math.min(0.42, pattern.interval / 1000 * 0.78);

      playTone(note, duration, pattern.type, baseGain);
      if (bgmStep % 2 === 0) {
        playTone(note * 0.5, Math.min(0.5, pattern.interval / 1000 * 0.9), "sine", baseGain * 0.42);
      }
      if (bgmStep % 3 === 0) {
        playTone(note * 1.5, 0.14, "triangle", baseGain * 0.08, 0.02);
      }
      if (bgmStep % 4 === 0) {
        playTone(note * 0.75, duration * 1.15, "triangle", baseGain * 0.1, 0.04);
      }
      if (bgmStep % 5 === 0) {
        playTone(note * 2, 0.1, "sine", baseGain * 0.06, 0.01);
      }
    }

    function playTone(frequency, duration = 0.16, type = "sine", gainValue = 0.04, delay = 0) {
      const context = getAudioContext();
      if (!context || gainValue <= 0) {
        return;
      }
      try {
        const startTime = context.currentTime + delay;
        const oscillator = context.createOscillator();
        const gain = context.createGain();
        oscillator.type = type;
        oscillator.frequency.setValueAtTime(frequency, startTime);
        gain.gain.setValueAtTime(0.0001, startTime);
        gain.gain.linearRampToValueAtTime(gainValue, startTime + 0.018);
        gain.gain.exponentialRampToValueAtTime(0.0001, startTime + duration);
        oscillator.connect(gain);
        gain.connect(context.destination);
        oscillator.start(startTime);
        oscillator.stop(startTime + duration + 0.03);
        oscillator.onended = () => {
          oscillator.disconnect();
          gain.disconnect();
        };
      } catch (error) {
        // Audio is optional; Safari or private browsing failures should not block play.
      }
    }

    function playToneSequence(notes, type = "sine", gainValue = 0.05, interval = 0.065, duration = 0.13) {
      notes.forEach((note, index) => {
        playTone(note, duration, type, gainValue, index * interval);
      });
    }

    function playSfx(type) {
      if (!audioUnlocked) {
        unlockAudio();
      }
      const volume = getSfxVolume();
      if (!audioUnlocked || volume <= 0) {
        return;
      }
      const now = performance.now();
      if (now - (sfxThrottle[type] || 0) < 50) {
        return;
      }
      sfxThrottle[type] = now;
      const gain = 0.055 * volume;

      switch (type) {
        case "tap":
          playTone(520, 0.045, "triangle", gain * 0.55);
          break;
        case "stage":
          playToneSequence([196, 246.94, 329.63], "triangle", gain * 0.78, 0.055, 0.12);
          break;
        case "correct":
          playToneSequence([523.25, 659.25, 783.99], "triangle", gain, 0.06, 0.14);
          break;
        case "wrong":
          playToneSequence([164.81, 123.47], "sawtooth", gain * 0.75, 0.07, 0.16);
          break;
        case "attackHero":
          playTone(640, 0.055, "square", gain * 0.85);
          playTone(260, 0.11, "sawtooth", gain * 0.75, 0.035);
          break;
        case "attackMage":
          playToneSequence([392, 622.25, 783.99], "triangle", gain * 0.9, 0.045, 0.16);
          break;
        case "attackHealer":
          playToneSequence([587.33, 783.99, 987.77], "sine", gain * 0.82, 0.055, 0.17);
          break;
        case "attackShield":
          playTone(180, 0.12, "square", gain * 0.86);
          playTone(260, 0.08, "triangle", gain * 0.6, 0.045);
          break;
        case "enemyAttack":
          playToneSequence([116.54, 98], "sawtooth", gain * 0.9, 0.055, 0.18);
          break;
        case "damage":
          playTone(92.5, 0.14, "square", gain * 0.7);
          break;
        case "guard":
          playToneSequence([246.94, 369.99, 246.94], "triangle", gain * 0.92, 0.04, 0.12);
          break;
        case "heal":
          playToneSequence([523.25, 659.25, 783.99, 1046.5], "sine", gain * 0.85, 0.07, 0.18);
          break;
        case "levelUp":
          playToneSequence([392, 523.25, 659.25, 783.99], "triangle", gain, 0.075, 0.16);
          break;
        case "gold":
          playToneSequence([987.77, 1318.51], "triangle", gain * 0.75, 0.06, 0.11);
          break;
        case "clear":
          playToneSequence([261.63, 329.63, 392, 523.25, 783.99], "triangle", gain, 0.07, 0.18);
          break;
        case "gameover":
          playToneSequence([220, 196, 164.81, 130.81], "sawtooth", gain * 0.78, 0.11, 0.22);
          break;
        case "reset":
          playToneSequence([164.81, 123.47, 98], "sawtooth", gain * 0.7, 0.075, 0.14);
          break;
        default:
          playTone(440, 0.07, "triangle", gain * 0.62);
      }
    }

    function loadRunState() {
      const saved = readStorageJson(runStorageKey);
      if (!isValidRunState(saved)) {
        return null;
      }
      return saved;
    }

    function isValidRunState(saved) {
      return Boolean(
        saved &&
        typeof saved === "object" &&
        saved.config &&
        Array.isArray(saved.sessionQuestions) &&
        saved.sessionQuestions.length > 0 &&
        Number.isInteger(saved.currentIndex) &&
        saved.currentIndex >= 0 &&
        saved.currentIndex < saved.sessionQuestions.length &&
        saved.quest &&
        !saved.quest.finished
      );
    }

    function createRunStatePayload() {
      if (!currentQuest || !currentQuestConfig || currentQuest.finished || currentQuest.savedRewards || isResolvingAnswer) {
        return null;
      }
      return {
        version: 1,
        savedAt: new Date().toISOString(),
        config: currentQuestConfig,
        sessionQuestions,
        currentIndex,
        currentOptions,
        isFuriganaVisible,
        correctCount,
        wrongQuestions,
        answerHistory,
        totalMistakes,
        isReviewMode,
        currentQuestionMisses,
        currentWrongSelections,
        allQuestionLimit,
        quest: currentQuest
      };
    }

    function saveRunState() {
      const payload = createRunStatePayload();
      if (!payload) {
        return;
      }
      try {
        localStorage.setItem(runStorageKey, JSON.stringify(payload));
      } catch (error) {
        console.warn("クエスト途中保存に失敗しました", error);
      }
    }

    function clearRunState() {
      try {
        localStorage.removeItem(runStorageKey);
      } catch (error) {
        console.warn("クエスト途中保存の削除に失敗しました", error);
      }
    }

    function getLevelInfo(totalExp) {
      let level = 1;
      let expIntoLevel = Math.max(0, Number(totalExp) || 0);

      while (level < 100 && expIntoLevel >= level * 100) {
        expIntoLevel -= level * 100;
        level += 1;
      }

      return {
        level,
        expIntoLevel,
        nextExp: level >= 100 ? 0 : level * 100 - expIntoLevel
      };
    }

    function getAdventurerTitle(level) {
      if (level >= 100) return "N2単語王";
      if (level >= 90) return "伝説の冒険者";
      if (level >= 80) return "魔王に迫る者";
      if (level >= 70) return "語彙マスター";
      if (level >= 60) return "迷宮の達人";
      if (level >= 50) return "熟練冒険者";
      if (level >= 40) return "単語騎士";
      if (level >= 30) return "N2ハンター";
      if (level >= 20) return "ダンジョン探索者";
      if (level >= 10) return "単語の旅人";
      return "見習い冒険者";
    }

    function stageLabel(stageKey) {
      return `地下${Number(stageKey)}階`;
    }

    function getStageRangeTitle(title) {
      const matched = title.match(/（(.+)）/);
      return matched ? matched[1] : title.replace(/^N2単語テスト\s*\d*\s*/, "");
    }

    function formatStars(count) {
      const safeCount = Math.max(0, Math.min(5, count));
      return `${"★".repeat(safeCount)}${"☆".repeat(5 - safeCount)}`;
    }

    function hasAnyClear(clearMap) {
      return Object.values(clearMap || {}).some(Boolean);
    }

    function getStageStars(stageKey) {
      const stage = gameState.stages[stageKey];
      const difficultyStars = difficultyOrder.filter((difficulty) => stage.noMiss[difficulty]).length;
      return Math.min(5, difficultyStars + stage.bonusStars);
    }

    function getAllStars() {
      const modeStars = ["20", "30", "50"].filter((mode) => gameState.all.noMiss[mode]).length;
      return Math.min(5, modeStars + gameState.all.bonusStars);
    }

    function isStageUnlocked(stageKey) {
      const floor = Number(stageKey);
      if (floor === 1) {
        return true;
      }
      const previous = gameState.stages[String(floor - 1)];
      return Boolean(previous && hasAnyClear(previous.clear));
    }

    function isAllDungeonUnlocked() {
      const stage20 = gameState.stages["20"];
      return Boolean(stage20 && hasAnyClear(stage20.clear));
    }

    function isAwakeningUnlocked() {
      return stageKeys.every((stageKey) => getStageStars(stageKey) === 5) && getAllStars() === 5;
    }

    function isDifficultyUnlocked(stageKind, stageKey, difficulty) {
      if (difficulty === "easy") {
        return true;
      }
      const target = stageKind === awakeningKey ? gameState.awakening : gameState.stages[stageKey];
      if (difficulty === "normal") {
        return Boolean(target.clear.easy);
      }
      return Boolean(target.clear.normal);
    }

    function isAllModeUnlocked(modeValue) {
      if (modeValue === 20) {
        return true;
      }
      if (modeValue === 30) {
        return gameState.all.clear["20"];
      }
      return gameState.all.clear["30"];
    }

    function showScreen(screenName) {
      setSelectionScreen.hidden = screenName !== "selection";
      allCountScreen.hidden = screenName !== "all-count";
      difficultyScreen.hidden = screenName !== "difficulty";
      quizScreen.hidden = screenName !== "quiz";
      resultScreen.hidden = screenName !== "result";
      document.body.classList.toggle("quiz-active", screenName === "quiz");
      document.body.classList.toggle("result-active", screenName === "result");
      document.body.classList.toggle("normal-active", ["selection", "all-count", "difficulty"].includes(screenName));
      if (screenName !== "quiz") {
        closeQuestMenu();
      }
      if (!["selection", "all-count", "difficulty"].includes(screenName)) {
        closeNormalMenu();
      }
      if (screenName !== "result") {
        resultScreen.className = "result";
      }
      if (["selection", "all-count", "difficulty"].includes(screenName)) {
        setBgmScene("selection");
      } else if (screenName === "quiz") {
        setBgmScene(currentQuest && currentQuest.enemy && currentQuest.enemy.isBoss ? "boss" : "battle");
      }
    }

    function createStageButton({ title, subtitle = "", stars = null, status = "", note = "", locked = false, onClick }) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = locked ? "set-button locked" : "set-button";
      button.disabled = locked;

      const main = document.createElement("div");
      main.className = "stage-button-main";

      const titleSpan = document.createElement("span");
      titleSpan.className = "stage-button-title";
      titleSpan.textContent = title;

      main.appendChild(titleSpan);
      if (stars !== null) {
        const starsSpan = document.createElement("span");
        starsSpan.className = "stars";
        starsSpan.textContent = formatStars(stars);
        main.appendChild(starsSpan);
      }
      button.appendChild(main);

      const meta = document.createElement("div");
      meta.className = "stage-button-meta";
      [subtitle, status].filter(Boolean).forEach((text) => {
        const span = document.createElement("span");
        span.textContent = text;
        meta.appendChild(span);
      });
      if (meta.childNodes.length > 0) {
        button.appendChild(meta);
      }

      if (note) {
        const noteEl = document.createElement("div");
        noteEl.className = "lock-note";
        noteEl.textContent = note;
        button.appendChild(noteEl);
      }

      if (!locked && typeof onClick === "function") {
        button.addEventListener("click", () => {
          playSfx("stage");
          onClick();
        });
      }
      return button;
    }

    function renderAdventurerStatus(message = "") {
      const levelInfo = getLevelInfo(gameState.totalExp);
      setMessage.innerHTML = "";

      const card = document.createElement("div");
      card.className = "adventurer-card";

      const title = document.createElement("div");
      title.className = "adventurer-card-title";
      title.textContent = "【冒険者証】";
      card.appendChild(title);

      if (message) {
        const notice = document.createElement("div");
        notice.className = "adventurer-notice";
        notice.textContent = message;
        card.appendChild(notice);
      }

      const stats = document.createElement("div");
      stats.className = "adventurer-stats";
      [
        ["称号", getAdventurerTitle(levelInfo.level)],
        ["Lv.", levelInfo.level],
        ["累計EXP", gameState.totalExp],
        ["所持G", gameState.totalGold]
      ].forEach(([label, value]) => {
        const stat = document.createElement("div");
        stat.className = "adventurer-stat";
        const labelEl = document.createElement("span");
        labelEl.className = "adventurer-label";
        labelEl.textContent = label;
        const valueEl = document.createElement("span");
        valueEl.className = "adventurer-value";
        valueEl.textContent = value;
        stat.append(labelEl, valueEl);
        stats.appendChild(stat);
      });

      card.appendChild(stats);
      setMessage.appendChild(card);
      setMessage.hidden = false;
    }

    function renderSetSelection(message = "") {
      setList.innerHTML = "";

      stageKeys.forEach((stageKey) => {
        const unlocked = isStageUnlocked(stageKey);
        const set = quizSets[stageKey];
        if (unlocked) {
          const clearText = hasAnyClear(gameState.stages[stageKey].clear) ? "CLEAR" : "挑戦可能";
          setList.appendChild(createStageButton({
            title: `${stageLabel(stageKey)}　${getStageRangeTitle(set.title)}`,
            subtitle: clearText,
            stars: getStageStars(stageKey),
            status: difficultyOrder
              .filter((difficulty) => gameState.stages[stageKey].clear[difficulty])
              .map((difficulty) => `${difficultyLabels[difficulty]} CLEAR`)
              .join(" / "),
            onClick: () => selectSet(stageKey, true)
          }));
          return;
        }
      });

      if (isAllDungeonUnlocked()) {
        setList.appendChild(createStageButton({
          title: "総合ダンジョン / 魔王城",
          subtitle: "挑戦可能",
          stars: getAllStars(),
          note: "20問・30問・50問モード",
          onClick: () => selectSet(allSetKey, true)
        }));
      }

      if (isAwakeningUnlocked()) {
        setList.appendChild(createStageButton({
          title: "魔王覚醒　最終試練",
          subtitle: "最終試練",
          note: getAwakeningClearText(),
          onClick: () => selectSet(awakeningKey, true)
        }));
      }

      renderAdventurerStatus(message);
      document.title = "N2単語ダンジョン";
      progressFill.style.width = "0%";
      showScreen("selection");
    }

    function getAwakeningClearText() {
      const cleared = difficultyOrder
        .filter((difficulty) => gameState.awakening.clear[difficulty])
        .map((difficulty) => `${difficultyLabels[difficulty].toUpperCase()} CLEAR`);
      return cleared.length > 0 ? cleared.join(" / ") : "イージーから挑戦可能";
    }

    function renderAllCountSelection() {
      allCountList.innerHTML = "";
      allModes.forEach((mode) => {
        const unlocked = isAllModeUnlocked(mode.value);
        const clearKey = String(mode.value);
        allCountList.appendChild(createStageButton({
          title: mode.label,
          subtitle: gameState.all.clear[clearKey] ? "CLEAR" : (unlocked ? "挑戦可能" : "LOCK"),
          stars: null,
          note: unlocked ? `${difficultyLabels[mode.difficulty]}相当 / ${mode.value}問` : mode.unlockText,
          locked: !unlocked,
          onClick: () => startConfiguredQuest({
            kind: allSetKey,
            mode: mode.value,
            difficulty: mode.difficulty
          })
        }));
      });

      document.title = "総合ダンジョン / 魔王城";
      progressFill.style.width = "0%";
      showScreen("all-count");
    }

    function renderDifficultySelection(context) {
      selectedStageContext = context;
      difficultyList.innerHTML = "";
      const isAwakening = context.kind === awakeningKey;
      difficultyTitle.textContent = isAwakening ? "魔王覚醒" : `${stageLabel(context.stageKey)} 難易度選択`;
      difficultyCopy.textContent = isAwakening
        ? "覚醒魔王に挑む難易度を選んでください"
        : `${quizSets[context.stageKey].title} のクエスト難易度を選んでください`;

      difficultyOrder.forEach((difficulty) => {
        const unlocked = isDifficultyUnlocked(context.kind, context.stageKey, difficulty);
        const clearMap = isAwakening ? gameState.awakening.clear : gameState.stages[context.stageKey].clear;
        const clearText = clearMap[difficulty] ? "CLEAR" : (unlocked ? "挑戦可能" : "LOCK");
        const lockText = difficulty === "normal" ? "イージークリアで解放" : "ノーマルクリアで解放";
        difficultyList.appendChild(createStageButton({
          title: difficultyLabels[difficulty],
          subtitle: clearText,
          note: unlocked ? getPartySummary(difficulty) : lockText,
          locked: !unlocked,
          onClick: () => startConfiguredQuest({
            kind: context.kind,
            stageKey: context.stageKey,
            difficulty
          })
        }));
      });

      showScreen("difficulty");
    }

    function getPartySummary(difficulty) {
      if (difficulty === "easy") {
        return "勇者・魔法使い・僧侶 / 合計HP9";
      }
      if (difficulty === "normal") {
        return "勇者・盾役 / 合計HP4";
      }
      return "勇者のみ / HP1";
    }

    function selectSet(setKey, updateUrl) {
      if (setKey === allSetKey) {
        if (!isAllDungeonUnlocked()) {
          renderSetSelection("総合ダンジョン / 魔王城は地下20階クリアで解放されます");
          return;
        }
        currentSetKey = allSetKey;
        currentSet = null;
        allQuestionLimit = null;
        if (updateUrl) {
          window.history.pushState({ set: allSetKey }, "", `${window.location.pathname}?set=${allSetKey}`);
        }
        renderAllCountSelection();
        return;
      }

      if (setKey === awakeningKey) {
        if (!isAwakeningUnlocked()) {
          renderSetSelection("魔王覚醒は全ステージ★★★★★で解放されます");
          return;
        }
        if (updateUrl) {
          window.history.pushState({ set: awakeningKey }, "", `${window.location.pathname}?set=${awakeningKey}`);
        }
        renderDifficultySelection({ kind: awakeningKey });
        return;
      }

      if (!quizSets[setKey] || !isStageUnlocked(setKey)) {
        renderSetSelection("この階層はまだ解放されていません");
        return;
      }

      currentSetKey = setKey;
      currentSet = quizSets[setKey];
      allQuestionLimit = null;
      if (updateUrl) {
        window.history.pushState({ set: setKey }, "", `${window.location.pathname}?set=${encodeURIComponent(setKey)}`);
      }
      renderDifficultySelection({ kind: "stage", stageKey: setKey });
    }

    function showSetSelectionAndClearUrl() {
      currentSetKey = "";
      currentSet = null;
      allQuestionLimit = null;
      selectedStageContext = null;
      window.history.pushState({}, "", window.location.pathname);
      renderSetSelection();
    }

    function handleRoute() {
      const setKey = new URLSearchParams(window.location.search).get("set");
      if (!setKey) {
        renderSetSelection();
        return;
      }
      selectSet(setKey, false);
    }

    function getSourceQuestionsForConfig(config) {
      if (config.kind === "stage") {
        return quizSets[config.stageKey].questions;
      }
      if (config.kind === allSetKey) {
        allQuestionLimit = config.mode;
        return shuffle(getAllQuestions()).slice(0, Math.min(config.mode, getAllQuestions().length));
      }
      if (config.kind === awakeningKey) {
        return getAllQuestions();
      }
      return config.questions || [];
    }

    function startConfiguredQuest(config) {
      const sourceQuestions = getSourceQuestionsForConfig(config);
      currentQuestConfig = {
        ...config,
        questions: config.kind === "review" ? sourceQuestions.slice() : undefined
      };
      startQuiz(sourceQuestions, config.kind === "review", config);
    }

    function startQuiz(sourceQuestions, reviewMode, config) {
      clearRunState();
      sessionQuestions = config.kind === awakeningKey
        ? shuffle(prepareQuestions(sourceQuestions))
        : shuffle(prepareQuestions(sourceQuestions));
      currentIndex = 0;
      correctCount = 0;
      wrongQuestions = [];
      answerHistory = [];
      totalMistakes = 0;
      isReviewMode = reviewMode;
      historyPanel.hidden = true;
      historyToggleButton.textContent = "回答履歴を見る";
      historyToggleButton.setAttribute("aria-expanded", "false");
      resultScreen.classList.remove("history-open");
      currentQuest = createQuest(config);
      document.title = currentQuest.fullTitle;
      showScreen("quiz");
      loadQuestion();
    }

    function restoreRunState(saved) {
      if (!isValidRunState(saved)) {
        clearRunState();
        renderSetSelection("途中保存データを読み込めませんでした");
        return;
      }

      currentQuestConfig = saved.config;
      applyContextFromConfig(saved.config);
      sessionQuestions = saved.sessionQuestions.map((question) => ({ ...question, options: (question.options || []).slice() }));
      currentIndex = saved.currentIndex;
      currentOptions = Array.isArray(saved.currentOptions) && saved.currentOptions.length > 0
        ? saved.currentOptions.slice()
        : (sessionQuestions[currentIndex].options || []).slice();
      correctCount = Math.max(0, Number(saved.correctCount) || 0);
      wrongQuestions = Array.isArray(saved.wrongQuestions) ? saved.wrongQuestions.slice() : [];
      answerHistory = Array.isArray(saved.answerHistory) ? saved.answerHistory.slice() : [];
      totalMistakes = Math.max(0, Number(saved.totalMistakes) || 0);
      isReviewMode = Boolean(saved.isReviewMode);
      currentQuestionMisses = Math.max(0, Number(saved.currentQuestionMisses) || 0);
      currentWrongSelections = Array.isArray(saved.currentWrongSelections) ? saved.currentWrongSelections.slice() : [];
      isFuriganaVisible = Boolean(saved.isFuriganaVisible);
      allQuestionLimit = saved.allQuestionLimit || (saved.config.kind === allSetKey ? saved.config.mode : null);

      const restoredQuest = saved.quest || {};
      const baseQuest = createQuest(saved.config);
      currentQuest = {
        ...baseQuest,
        ...restoredQuest,
        stageText: restoredQuest.stageText || baseQuest.stageText,
        fullTitle: restoredQuest.fullTitle || baseQuest.fullTitle,
        party: Array.isArray(restoredQuest.party) ? restoredQuest.party : baseQuest.party,
        enemy: restoredQuest.enemy || baseQuest.enemy,
        savedRewards: false,
        finished: false,
        pendingFeedback: restoredQuest.pendingFeedback || "途中から再開しました"
      };

      historyPanel.hidden = true;
      historyToggleButton.textContent = "回答履歴を見る";
      historyToggleButton.setAttribute("aria-expanded", "false");
      resultScreen.classList.remove("history-open");
      document.title = currentQuest.fullTitle;
      showScreen("quiz");
      renderQuestion();
      saveRunState();
    }

    function applyContextFromConfig(config) {
      selectedStageContext = null;
      currentSetKey = "";
      currentSet = null;
      allQuestionLimit = null;
      if (config.kind === "stage") {
        currentSetKey = config.stageKey;
        currentSet = quizSets[config.stageKey] || null;
        selectedStageContext = { kind: "stage", stageKey: config.stageKey };
      } else if (config.kind === allSetKey) {
        currentSetKey = allSetKey;
        allQuestionLimit = config.mode;
      } else if (config.kind === awakeningKey) {
        currentSetKey = awakeningKey;
        selectedStageContext = { kind: awakeningKey };
      }
    }

    function createQuest(config) {
      const difficulty = config.difficulty || "easy";
      const total = sessionQuestions.length;
      const bossQuestionCount = config.kind === awakeningKey ? total : getBossQuestionCount(total);
      const bossStartIndex = config.kind === awakeningKey ? 0 : Math.max(0, total - bossQuestionCount);
      const stageText = getQuestStageText(config);
      const fullTitle = `${stageText} / ${getQuestModeText(config)}`;

      return {
        kind: config.kind,
        stageKey: config.stageKey || "",
        mode: config.mode || null,
        difficulty,
        stageText,
        fullTitle,
        party: createParty(difficulty),
        enemy: null,
        bossStartIndex,
        bossStarted: false,
        completedQuestions: 0,
        exp: 0,
        gold: 0,
        savedRewards: false,
        pendingFeedback: "",
        attackCursor: 0,
        finished: false
      };
    }

    function getQuestStageText(config) {
      if (config.kind === "stage") {
        return stageLabel(config.stageKey);
      }
      if (config.kind === allSetKey) {
        return "総合ダンジョン / 魔王城";
      }
      if (config.kind === awakeningKey) {
        return "魔王覚醒";
      }
      return "復習クエスト";
    }

    function getQuestModeText(config) {
      if (config.kind === allSetKey) {
        return `${config.mode}問モード`;
      }
      if (config.kind === "review") {
        return "復習クエスト";
      }
      return difficultyLabels[config.difficulty || "easy"];
    }

    function createParty(difficulty) {
      if (difficulty === "easy") {
        return [
          { id: "hero", name: "勇者", maxHp: 3, hp: 3, role: "front", color: "#fde68a", tool: "weapon" },
          { id: "mage", name: "魔法使い", maxHp: 3, hp: 3, role: "back", color: "#c4b5fd", tool: "staff" },
          { id: "healer", name: "僧侶", maxHp: 3, hp: 3, role: "back", color: "#86efac", tool: "staff" }
        ];
      }
      if (difficulty === "normal") {
        return [
          { id: "hero", name: "勇者", maxHp: 2, hp: 2, role: "front", color: "#fde68a", tool: "weapon" },
          { id: "shield", name: "盾役", maxHp: 2, hp: 2, role: "back", color: "#93c5fd", tool: "shield" }
        ];
      }
      return [
        { id: "hero", name: "勇者", maxHp: 1, hp: 1, role: "front", color: "#fde68a", tool: "weapon" }
      ];
    }

    function getBossQuestionCount(total) {
      if (total <= 20) {
        return Math.min(5, total);
      }
      if (total <= 30) {
        return 7;
      }
      return 10;
    }

    function loadQuestion() {
      if (!sessionQuestions[currentIndex]) {
        showResult("clear");
        return;
      }

      isResolvingAnswer = false;
      currentQuestionMisses = 0;
      currentWrongSelections = [];
      isFuriganaVisible = false;
      currentOptions = shuffle(sessionQuestions[currentIndex].options);
      ensureEnemyForQuestion();
      renderQuestion();
      saveRunState();
    }

    function ensureEnemyForQuestion() {
      if (currentQuest.kind === awakeningKey) {
        if (!currentQuest.enemy) {
          spawnBossEnemy(true);
        }
        currentQuest.bossStarted = true;
        return;
      }

      if (currentIndex >= currentQuest.bossStartIndex) {
        if (!currentQuest.bossStarted) {
          currentQuest.bossStarted = true;
          if (applyHeal()) {
            currentQuest.pendingFeedback = "ボス前回復！ 僧侶の祈り！";
          }
        }
        if (!currentQuest.enemy || !currentQuest.enemy.isBoss) {
          spawnBossEnemy(false);
        }
        return;
      }

      if (!currentQuest.enemy || currentQuest.enemy.hp <= 0 || currentQuest.enemy.isBoss) {
        spawnNormalEnemy();
      }
    }

    function spawnNormalEnemy() {
      const remainingNormalQuestions = Math.max(1, currentQuest.bossStartIndex - currentIndex);
      const available = ["slime", "bat", "goblin", "skeleton"]
        .map((type) => ({ type, ...enemyCatalog[type] }))
        .filter((enemy) => enemy.hp <= remainingNormalQuestions);
      const totalWeight = available.reduce((sum, enemy) => sum + enemy.weight, 0);
      let roll = Math.random() * totalWeight;
      const selected = available.find((enemy) => {
        roll -= enemy.weight;
        return roll <= 0;
      }) || available[0];
      currentQuest.enemy = createEnemy(selected.type, enemyCatalog[selected.type].hp);
    }

    function spawnBossEnemy(isAwakened) {
      const type = isAwakened ? "awakened" : "demon";
      const hp = Math.max(1, sessionQuestions.length - currentIndex);
      currentQuest.enemy = createEnemy(type, hp);
      currentQuest.pendingFeedback = isAwakened ? "覚醒魔王、出現！" : "BOSS BATTLE　魔王の間";
    }

    function createEnemy(type, hp) {
      const catalog = enemyCatalog[type];
      return {
        type,
        name: catalog.name,
        css: catalog.css,
        hp,
        maxHp: hp,
        attack: catalog.attack,
        isBoss: type === "demon" || type === "awakened"
      };
    }

    function renderQuestion() {
      const current = sessionQuestions[currentIndex];
      const levelInfo = getLevelInfo(gameState.totalExp + currentQuest.exp);
      progressText.textContent = `問題 ${currentIndex + 1}/${sessionQuestions.length}`;
      levelText.textContent = `Lv.${levelInfo.level}`;
      questExpText.textContent = `EXP +${currentQuest.exp}`;
      questGoldText.textContent = `G +${currentQuest.gold}`;
      quizSetTitle.textContent = currentQuest.fullTitle;
      bossBadge.hidden = !(currentQuest.enemy && currentQuest.enemy.isBoss);
      word.textContent = current.japanese;
      reading.textContent = isFuriganaVisible ? current.furigana : "";
      furiganaButton.textContent = isFuriganaVisible ? "隠す" : "かな";
      feedback.textContent = currentQuest.pendingFeedback || "";
      feedback.className = "feedback";
      currentQuest.pendingFeedback = "";
      nextButton.hidden = true;
      progressFill.style.width = `${((currentIndex + 1) / sessionQuestions.length) * 100}%`;
      renderParty();
      renderEnemy();
      updateQuestMenuDetails(levelInfo);
      setBgmScene(currentQuest.enemy && currentQuest.enemy.isBoss ? "boss" : "battle");

      choices.innerHTML = "";
      currentOptions.forEach((option) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "choice-button";
        button.textContent = option;
        button.addEventListener("click", () => chooseAnswer(option, button));
        choices.appendChild(button);
      });
    }

    function renderParty() {
      partyArea.innerHTML = "";
      currentQuest.party.forEach((member) => {
        const card = document.createElement("div");
        card.className = `hero-card unit-${member.id} ${member.role === "front" ? "front" : "back"} ${member.hp <= 0 ? "down" : ""}`;
        card.dataset.id = member.id;
        card.style.color = member.color;

        const stick = document.createElement("div");
        stick.className = "stick";
        ["body", "arm left", "arm right", "leg left", "leg right"].forEach((part) => {
          const span = document.createElement("span");
          span.className = `stick-${part}`;
          stick.appendChild(span);
        });
        if (member.tool === "weapon") {
          const weapon = document.createElement("span");
          weapon.className = "weapon";
          stick.appendChild(weapon);
        }
        if (member.tool === "shield") {
          const shield = document.createElement("span");
          shield.className = "shield-icon";
          stick.appendChild(shield);
        }
        if (member.tool === "staff") {
          const staff = document.createElement("span");
          staff.className = "staff-icon";
          stick.appendChild(staff);
        }

        const name = document.createElement("span");
        name.className = "hero-name";
        name.textContent = member.name;
        card.append(stick, name, createHpBar(member.hp, member.maxHp));
        partyArea.appendChild(card);
      });
    }

    function renderEnemy() {
      const enemy = currentQuest.enemy;
      enemyPanel.innerHTML = "";
      enemyPanel.classList.remove("hit", "attack", "defeated");
      if (!enemy) {
        return;
      }

      const name = document.createElement("span");
      name.className = "enemy-name";
      name.textContent = enemy.name;
      const hp = createHpBar(enemy.hp, enemy.maxHp);
      hp.classList.add("enemy-hp");
      const monster = document.createElement("div");
      monster.className = `monster ${enemy.css}`;
      enemyPanel.append(name, hp, monster);
    }

    function createHpBar(hp, maxHp) {
      const track = document.createElement("div");
      track.className = "hp-track";
      const fill = document.createElement("div");
      fill.className = "hp-fill";
      fill.style.width = `${Math.max(0, Math.min(100, (hp / maxHp) * 100))}%`;
      track.appendChild(fill);
      return track;
    }

    function chooseAnswer(selectedOption, selectedButton) {
      if (isResolvingAnswer || currentQuest.finished) {
        return;
      }

      const current = sessionQuestions[currentIndex];
      const isCorrect = selectedOption === current.answer;
      if (isCorrect) {
        handleCorrectAnswer(selectedButton);
        return;
      }

      handleWrongAnswer(selectedOption, selectedButton);
    }

    function handleCorrectAnswer(selectedButton) {
      isResolvingAnswer = true;
      playSfx("correct");
      const current = sessionQuestions[currentIndex];
      selectedButton.classList.add("correct");
      [...choices.children].forEach((button) => {
        button.disabled = true;
        if (button.textContent === current.answer) {
          button.classList.add("correct");
        }
      });

      correctCount += 1;
      currentQuest.completedQuestions += 1;
      const attacker = getNextAttacker();
      addQuestionReward();
      currentQuest.enemy.hp = Math.max(0, currentQuest.enemy.hp - 1);
      renderEnemy();
      answerHistory.push({
        number: currentIndex + 1,
        japanese: current.japanese,
        furigana: current.furigana,
        selectedAnswer: current.answer,
        correctAnswer: current.answer,
        missCount: currentQuestionMisses,
        isCorrect: true,
        finalResult: "正解"
      });

      if (currentQuestionMisses > 0) {
        addWrongQuestion(current);
      }

      const attackCue = getAttackCue(attacker);
      feedback.textContent = currentQuest.enemy.hp <= 0 ? `${attackCue} 魔物を撃破！` : attackCue;
      feedback.className = "feedback correct";
      pulseEnemy("hit");
      playAllyAttack(attacker);

      if (currentQuest.enemy.hp <= 0) {
        addDefeatReward();
        enemyPanel.classList.add("defeated");
      }

      setTimeout(() => {
        if (currentIndex + 1 >= sessionQuestions.length) {
          showResult("clear");
          return;
        }

        currentIndex += 1;
        if (currentQuest.difficulty === "easy" && currentQuest.completedQuestions % 6 === 0) {
          if (applyHeal()) {
            currentQuest.pendingFeedback = "僧侶の祈り！";
          }
        }
        loadQuestion();
      }, 620);
    }

    function handleWrongAnswer(selectedOption, selectedButton) {
      isResolvingAnswer = true;
      playSfx("wrong");
      [...choices.children].forEach((button) => {
        button.disabled = true;
      });
      currentQuestionMisses += 1;
      totalMistakes += 1;
      currentWrongSelections.push(selectedOption);
      selectedButton.classList.remove("wrong-flash");
      void selectedButton.offsetWidth;
      selectedButton.classList.add("wrong-flash");
      setTimeout(() => selectedButton.classList.remove("wrong-flash"), 380);

      const attackMessage = applyEnemyAttack();
      feedback.textContent = `ミス！ ${attackMessage}`;
      feedback.className = "feedback wrong";
      pulseEnemy("attack");

      if (isPartyDefeated()) {
        const current = sessionQuestions[currentIndex];
        addWrongQuestion(current);
        answerHistory.push({
          number: currentIndex + 1,
          japanese: current.japanese,
          furigana: current.furigana,
          selectedAnswer: selectedOption,
          correctAnswer: current.answer,
          missCount: currentQuestionMisses,
          isCorrect: false,
          finalResult: "GAME OVER"
        });
        feedback.textContent = `GAME OVER　正解：${current.answer}`;
        currentQuest.finished = true;
        isResolvingAnswer = true;
        clearRunState();
        setTimeout(() => showResult("gameover"), 900);
      } else {
        setTimeout(() => {
          [...choices.children].forEach((button) => {
            button.disabled = false;
          });
          isResolvingAnswer = false;
          saveRunState();
        }, 640);
      }
    }

    function getNextAttacker() {
      if (!currentQuest) {
        return null;
      }
      const alive = currentQuest.party.filter((member) => member.hp > 0);
      if (alive.length === 0) {
        return null;
      }
      const attacker = alive[currentQuest.attackCursor % alive.length];
      currentQuest.attackCursor = (currentQuest.attackCursor + 1) % alive.length;
      return attacker;
    }

    function getAttackCue(member) {
      if (!member) {
        return "攻撃成功！";
      }
      if (member.id === "mage") {
        return "魔法使いの魔弾！";
      }
      if (member.id === "healer") {
        return "僧侶の聖なる光！";
      }
      if (member.id === "shield") {
        return "盾役の突進！";
      }
      return "勇者の斬撃！";
    }

    function playAllyAttack(member) {
      if (!member) {
        showEffect("slash");
        return;
      }
      const attackMap = {
        hero: ["attack-hero", "slash"],
        mage: ["attack-mage", "magic"],
        healer: ["attack-healer", "holy"],
        shield: ["attack-shield", "shield"]
      };
      const sfxMap = {
        hero: "attackHero",
        mage: "attackMage",
        healer: "attackHealer",
        shield: "attackShield"
      };
      const [motionClass, effectType] = attackMap[member.id] || attackMap.hero;
      playSfx(sfxMap[member.id] || "attackHero");
      pulseHero(member.id, motionClass, 760);
      showEffect(effectType, member.id, "enemy");
    }

    function addWrongQuestion(question) {
      if (!wrongQuestions.some((item) => item.japanese === question.japanese && item.answer === question.answer)) {
        wrongQuestions.push(question);
      }
    }

    function recordCurrentQuestionAsInterrupted(finalResult) {
      const current = sessionQuestions[currentIndex];
      if (!current || currentQuestionMisses === 0) {
        return;
      }
      if (answerHistory.some((item) => item.number === currentIndex + 1)) {
        return;
      }

      addWrongQuestion(current);
      answerHistory.push({
        number: currentIndex + 1,
        japanese: current.japanese,
        furigana: current.furigana,
        selectedAnswer: currentWrongSelections[currentWrongSelections.length - 1] || "未回答",
        correctAnswer: current.answer,
        missCount: currentQuestionMisses,
        isCorrect: false,
        finalResult
      });
    }

    function addQuestionReward() {
      const reward = enemyCatalog[currentQuest.enemy.type];
      currentQuest.exp += getScaledExp(reward.exp);
      currentQuest.gold += reward.gold;
      renderQuestStats();
    }

    function addDefeatReward() {
      const reward = enemyCatalog[currentQuest.enemy.type];
      currentQuest.exp += getScaledExp(reward.defeatExp);
      currentQuest.gold += reward.defeatGold;
      renderQuestStats();
    }

    function getScaledExp(baseExp) {
      const difficultyMultiplier = currentQuest.difficulty === "hard" ? 2 : currentQuest.difficulty === "normal" ? 1.4 : 1;
      return Math.round(baseExp * difficultyMultiplier * getFloorMultiplier());
    }

    function getFloorMultiplier() {
      if (currentQuest.kind === awakeningKey) {
        return 1.3;
      }
      if (currentQuest.kind === allSetKey) {
        return 1.2;
      }
      const floor = Number(currentQuest.stageKey);
      if (floor <= 5) return 1;
      if (floor <= 10) return 1.05;
      if (floor <= 15) return 1.1;
      return 1.15;
    }

    function renderQuestStats() {
      const levelInfo = getLevelInfo(gameState.totalExp + currentQuest.exp);
      levelText.textContent = `Lv.${levelInfo.level}`;
      questExpText.textContent = `EXP +${currentQuest.exp}`;
      questGoldText.textContent = `G +${currentQuest.gold}`;
      updateQuestMenuDetails(levelInfo);
    }

    function updateQuestMenuDetails(levelInfo = getLevelInfo(gameState.totalExp + (currentQuest ? currentQuest.exp : 0))) {
      if (!currentQuest) {
        return;
      }
      menuStageText.textContent = currentQuest.stageText;
      menuDifficultyText.textContent = getQuestModeText(currentQuest);
      menuExpText.textContent = `+${currentQuest.exp}`;
      menuGoldText.textContent = `+${currentQuest.gold}`;
      menuProgressText.textContent = `${currentIndex + 1}/${sessionQuestions.length}`;
    }

    function openQuestMenu() {
      if (!currentQuest || currentQuest.finished) {
        return;
      }
      syncSoundControls();
      updateQuestMenuDetails();
      questMenuOverlay.hidden = false;
      questMenuButton.setAttribute("aria-expanded", "true");
      quizScreen.classList.add("menu-open");
    }

    function closeQuestMenu() {
      if (!questMenuOverlay) {
        return;
      }
      questMenuOverlay.hidden = true;
      questMenuButton.setAttribute("aria-expanded", "false");
      quizScreen.classList.remove("menu-open");
    }

    function openNormalMenu() {
      saveDataMessage.textContent = "";
      syncSoundControls();
      normalMenuOverlay.hidden = false;
      normalMenuButton.setAttribute("aria-expanded", "true");
      document.body.classList.add("normal-menu-open");
    }

    function closeNormalMenu() {
      if (!normalMenuOverlay) {
        return;
      }
      normalMenuOverlay.hidden = true;
      normalMenuButton.setAttribute("aria-expanded", "false");
      document.body.classList.remove("normal-menu-open");
    }

    function showResumeRunPrompt(saved) {
      const quest = saved.quest || {};
      const config = saved.config || {};
      const stage = quest.stageText || getQuestStageText(config);
      const mode = getQuestModeText(config);
      resumeRunCopy.textContent = `${stage} / ${mode} の途中です。問題 ${saved.currentIndex + 1}/${saved.sessionQuestions.length} から再開できます。`;
      resumeRunOverlay.hidden = false;
      document.body.classList.add("resume-run-open");
    }

    function closeResumeRunPrompt() {
      resumeRunOverlay.hidden = true;
      document.body.classList.remove("resume-run-open");
    }

    function applyEnemyAttack() {
      const enemy = currentQuest.enemy;
      const isAwakened = enemy.type === "awakened";
      const isBoss = enemy.type === "demon" || isAwakened;
      const areaRate = isAwakened ? 0.4 : 0.3;

      if (isBoss && Math.random() < areaRate) {
        const damage = isAwakened ? 2 : 1;
        currentQuest.party.filter((member) => member.hp > 0).forEach((member) => {
          member.hp = Math.max(0, member.hp - damage);
        });
        playSfx("enemyAttack");
        window.setTimeout(() => playSfx("damage"), 90);
        renderParty();
        currentQuest.party.forEach((member) => pulseHero(member.id, "hit", 560));
        showEffect("enemy", "enemy", "party");
        return `${enemy.name}の全体攻撃！ 生きている味方に${damage}ダメージ`;
      }

      const target = chooseAttackTarget();
      if (!target) {
        return `${enemy.name}の攻撃！`;
      }
      const shieldGuard = getShieldGuardMember(target);
      if (shieldGuard && Math.random() < 0.3) {
        playSfx("enemyAttack");
        window.setTimeout(() => playSfx("guard"), 120);
        renderParty();
        pulseHero(shieldGuard.id, "guard", 760);
        pulseHero(target.id, "guarded", 760);
        showEffect("enemy", "enemy", target.id);
        showEffect("guard", shieldGuard.id, target.id);
        return "盾役がかばった！ ダメージ0";
      }

      const damage = enemy.attack;
      target.hp = Math.max(0, target.hp - damage);
      playSfx("enemyAttack");
      window.setTimeout(() => playSfx("damage"), 100);
      renderParty();
      pulseHero(target.id, "hit", 560);
      showEffect("enemy", "enemy", target.id);
      return `${enemy.name}の攻撃！ ${target.name}に${damage}ダメージ`;
    }

    function getShieldGuardMember(target) {
      if (!target || target.id !== "hero" || currentQuest.difficulty !== "normal") {
        return null;
      }
      return currentQuest.party.find((member) => member.id === "shield" && member.hp > 0) || null;
    }

    function chooseAttackTarget() {
      const alive = currentQuest.party.filter((member) => member.hp > 0);
      if (alive.length === 0) {
        return null;
      }

      const weights = alive.map((member) => {
        if (currentQuest.difficulty === "easy") {
          if (member.id === "mage") return 40;
          if (member.id === "healer") return 40;
          return 20;
        }
        if (currentQuest.difficulty === "normal") {
          return member.id === "shield" ? 70 : 30;
        }
        return 100;
      });
      const totalWeight = weights.reduce((sum, weight) => sum + weight, 0);
      let roll = Math.random() * totalWeight;
      for (let i = 0; i < alive.length; i += 1) {
        roll -= weights[i];
        if (roll <= 0) {
          return alive[i];
        }
      }
      return alive[0];
    }

    function applyHeal() {
      if (currentQuest.difficulty !== "easy") {
        return false;
      }
      const healer = currentQuest.party.find((member) => member.id === "healer");
      if (!healer || healer.hp <= 0) {
        return false;
      }

      const healedIds = [];
      currentQuest.party.forEach((member) => {
        if (member.hp > 0 && member.hp < member.maxHp) {
          member.hp += 1;
          healedIds.push(member.id);
        }
      });
      if (healedIds.length > 0) {
        playSfx("heal");
        renderParty();
        pulseHero(healer.id, "heal-cast", 760);
        currentQuest.party.forEach((member) => pulseHero(member.id, "heal", 760));
        showHealEffects(healer.id, healedIds);
      }
      return healedIds.length > 0;
    }

    function isPartyDefeated() {
      return currentQuest.party.every((member) => member.hp <= 0);
    }

    function pulseHero(id, className, duration = 620) {
      const target = partyArea.querySelector(`[data-id="${id}"]`);
      if (!target) {
        return;
      }
      target.classList.remove(className);
      void target.offsetWidth;
      target.classList.add(className);
      setTimeout(() => target.classList.remove(className), duration);
    }

    function pulseEnemy(className, duration = 560) {
      enemyPanel.classList.remove(className);
      void enemyPanel.offsetWidth;
      enemyPanel.classList.add(className);
      setTimeout(() => enemyPanel.classList.remove(className), duration);
    }

    function getEffectElement(id) {
      if (id === "enemy") {
        return enemyPanel;
      }
      if (id === "party") {
        return partyArea;
      }
      return partyArea.querySelector(`[data-id="${id}"]`);
    }

    function getEffectAnchor(element, xRatio = 0.5, yRatio = 0.58) {
      const layerRect = effectLayer.getBoundingClientRect();
      const rect = element.getBoundingClientRect();
      return {
        x: rect.left - layerRect.left + rect.width * xRatio,
        y: rect.top - layerRect.top + rect.height * yRatio
      };
    }

    function setEffectPosition(effect, source, target) {
      const from = source || target || { x: effectLayer.clientWidth * 0.5, y: effectLayer.clientHeight * 0.62 };
      const to = target || source || from;
      effect.style.setProperty("--from-x", `${from.x}px`);
      effect.style.setProperty("--from-y", `${from.y}px`);
      effect.style.setProperty("--to-x", `${to.x}px`);
      effect.style.setProperty("--to-y", `${to.y}px`);
      effect.style.setProperty("--mid-x", `${(from.x + to.x) / 2}px`);
      effect.style.setProperty("--mid-y", `${(from.y + to.y) / 2}px`);
      effect.style.setProperty("--move-x", `${to.x - from.x}px`);
      effect.style.setProperty("--move-y", `${to.y - from.y}px`);
    }

    function showHealEffects(healerId, healedIds) {
      [...new Set([healerId, ...healedIds])].forEach((id) => {
        showEffect("heal", id, id);
      });
    }

    function showEffect(type, sourceId = null, targetId = "enemy") {
      const effect = document.createElement("div");
      const effectClassMap = {
        slash: "slash-effect",
        magic: "magic-effect",
        staff: "staff-effect",
        holy: "holy-effect",
        shield: "shield-effect",
        guard: "guard-effect",
        enemy: "enemy-strike-effect",
        heal: "heal-effect"
      };
      effect.className = effectClassMap[type] || "slash-effect";
      const sourceEl = sourceId ? getEffectElement(sourceId) : null;
      const targetEl = targetId ? getEffectElement(targetId) : null;
      const source = sourceEl
        ? getEffectAnchor(sourceEl, sourceId === "enemy" ? 0.25 : 0.74, sourceId === "enemy" ? 0.58 : 0.54)
        : null;
      const target = targetEl
        ? getEffectAnchor(targetEl, targetId === "enemy" ? 0.48 : 0.56, targetId === "enemy" ? 0.58 : 0.54)
        : null;
      setEffectPosition(effect, source, target);
      effectLayer.appendChild(effect);
      setTimeout(() => effect.remove(), 820);
    }

    function showResult(resultType = "clear") {
      if (!currentQuest || currentQuest.savedRewards) {
        return;
      }
      currentQuest.finished = true;
      clearRunState();
      const previousLevelInfo = getLevelInfo(gameState.totalExp);
      const unlockMessages = applyQuestCompletion(resultType);
      gameState.totalExp += currentQuest.exp;
      gameState.totalGold += currentQuest.gold;
      currentQuest.savedRewards = true;
      saveGameState();

      const answeredTotal = resultType === "giveup"
        ? answerHistory.length
        : resultType === "gameover"
          ? Math.max(answerHistory.length, currentIndex + 1)
          : sessionQuestions.length;
      const rate = answeredTotal === 0 ? 0 : Math.round((correctCount / answeredTotal) * 100);
      const rank = getRank(resultType, rate);
      const levelInfo = getLevelInfo(gameState.totalExp);

      showScreen("result");
      resultScreen.className = `result result-${resultType}`;
      resultScreen.classList.remove("history-open");
      setBgmScene(resultType === "gameover" ? "gameover" : resultType === "clear" ? "clear" : "selection");
      playSfx(resultType === "gameover" ? "gameover" : resultType === "clear" ? "clear" : "wrong");
      if (levelInfo.level > previousLevelInfo.level) {
        window.setTimeout(() => playSfx("levelUp"), 260);
      } else if (currentQuest.gold > 0) {
        window.setTimeout(() => playSfx("gold"), 260);
      }
      resultTitle.textContent = getResultTitle(resultType);
      resultSetTitle.textContent = getResultSubtitle(resultType);
      scoreText.textContent = `${correctCount} / ${answeredTotal}問 正解`;
      rateText.textContent = `正答率${rate}%　ランク ${rank}`;
      progressFill.style.width = resultType === "clear" ? "100%" : `${Math.min(100, (currentIndex / sessionQuestions.length) * 100)}%`;
      renderAnswerHistory();
      renderResultDetails(rate, rank, levelInfo);
      renderUnlockMessages(unlockMessages);

      if (resultType === "clear" && totalMistakes === 0) {
        perfectText.hidden = false;
        perfectText.textContent = unlockMessages.some((message) => message.includes("星獲得"))
          ? "ノーミスクリア！ 星獲得！"
          : "ノーミスクリア！";
      } else if (currentQuest.kind === awakeningKey) {
        perfectText.hidden = false;
      } else {
        perfectText.hidden = true;
      }
    }

    function applyQuestCompletion(resultType) {
      const messages = [];
      const isClear = resultType === "clear";
      const beforeAwakening = isAwakeningUnlocked();

      if (!isClear || isReviewMode) {
        return messages;
      }

      if (currentQuest.kind === "stage") {
        const stage = gameState.stages[currentQuest.stageKey];
        const floor = Number(currentQuest.stageKey);
        const beforeNextStage = stageKeys.includes(String(floor + 1)) && isStageUnlocked(String(floor + 1));
        const beforeAllDungeon = isAllDungeonUnlocked();
        if (!stage.clear[currentQuest.difficulty]) {
          stage.clear[currentQuest.difficulty] = true;
          messages.push(`${difficultyLabels[currentQuest.difficulty]} CLEAR`);
        }
        if (totalMistakes === 0 && awardStageStar(currentQuest.stageKey, currentQuest.difficulty)) {
          messages.push(`星獲得！ ${formatStars(getStageStars(currentQuest.stageKey))}`);
        }
        if (currentQuest.difficulty === "easy" && stage.clear.easy && !stage.clear.normal) {
          messages.push("ノーマル解放！");
        }
        if (currentQuest.difficulty === "normal" && stage.clear.normal && !stage.clear.hard) {
          messages.push("ハード解放！");
        }
        if (!beforeNextStage && stageKeys.includes(String(floor + 1)) && isStageUnlocked(String(floor + 1))) {
          messages.push(`${stageLabel(String(floor + 1))} 解放！`);
        }
        if (!beforeAllDungeon && isAllDungeonUnlocked()) {
          messages.push("総合ダンジョン / 魔王城 解放！");
        }
      }

      if (currentQuest.kind === allSetKey) {
        const modeKey = String(currentQuest.mode);
        if (!gameState.all.clear[modeKey]) {
          gameState.all.clear[modeKey] = true;
          messages.push(`${currentQuest.mode}問モード CLEAR`);
        }
        if (totalMistakes === 0 && awardAllStar(modeKey)) {
          messages.push(`総合ダンジョン 星獲得！ ${formatStars(getAllStars())}`);
        }
        if (currentQuest.mode === 20 && !gameState.all.clear["30"]) {
          messages.push("30問モード解放！");
        }
        if (currentQuest.mode === 30 && !gameState.all.clear["50"]) {
          messages.push("50問モード解放！");
        }
      }

      if (currentQuest.kind === awakeningKey) {
        if (!gameState.awakening.clear[currentQuest.difficulty]) {
          gameState.awakening.clear[currentQuest.difficulty] = true;
          messages.push(`魔王覚醒 ${difficultyLabels[currentQuest.difficulty].toUpperCase()} CLEAR`);
        }
        if (currentQuest.difficulty === "easy" && !gameState.awakening.clear.normal) {
          messages.push("魔王覚醒 ノーマル解放！");
        }
        if (currentQuest.difficulty === "normal" && !gameState.awakening.clear.hard) {
          messages.push("魔王覚醒 ハード解放！");
        }
        messages.push("魔王覚醒撃破！ 完全制覇！");
      }

      if (!beforeAwakening && isAwakeningUnlocked()) {
        messages.push("魔王覚醒 解放！");
      }
      return messages;
    }

    function awardStageStar(stageKey, difficulty) {
      const stage = gameState.stages[stageKey];
      const before = getStageStars(stageKey);
      if (!stage.noMiss[difficulty]) {
        stage.noMiss[difficulty] = true;
      } else if (getStageStars(stageKey) < 5 && stage.bonusStars < 2) {
        stage.bonusStars += 1;
      }
      return getStageStars(stageKey) > before;
    }

    function awardAllStar(modeKey) {
      const before = getAllStars();
      if (!gameState.all.noMiss[modeKey]) {
        gameState.all.noMiss[modeKey] = true;
      } else if (getAllStars() < 5 && gameState.all.bonusStars < 2) {
        gameState.all.bonusStars += 1;
      }
      return getAllStars() > before;
    }

    function getResultTitle(resultType) {
      if (resultType === "gameover") {
        return "GAME OVER";
      }
      if (resultType === "giveup") {
        return "途中終了";
      }
      if (currentQuest.kind === awakeningKey) {
        return "魔王覚醒撃破！";
      }
      if (isReviewMode) {
        return "復習完了";
      }
      return "ダンジョンクリア";
    }

    function getResultSubtitle(resultType) {
      if (resultType === "gameover") {
        return `ダンジョン攻略失敗 / ${currentQuest.fullTitle}`;
      }
      if (resultType === "giveup") {
        return `途中撤退 / ${currentQuest.fullTitle}`;
      }
      if (currentQuest.kind === "stage") {
        return `${stageLabel(currentQuest.stageKey)} 攻略完了 / ${difficultyLabels[currentQuest.difficulty]}`;
      }
      if (currentQuest.kind === allSetKey) {
        return `魔王城 攻略完了 / ${currentQuest.mode}問モード`;
      }
      if (currentQuest.kind === awakeningKey) {
        return `覚醒魔王 討伐完了 / ${difficultyLabels[currentQuest.difficulty]}`;
      }
      return currentQuest.fullTitle;
    }

    function getRank(resultType, rate) {
      if (resultType === "gameover") return "E";
      if (resultType === "giveup") return "F";
      if (rate === 100) return "SSS";
      if (rate >= 90) return "S";
      if (rate >= 80) return "A";
      if (rate >= 70) return "B";
      if (rate >= 60) return "C";
      return "D";
    }

    function renderResultDetails(rate, rank, levelInfo) {
      gameResultDetails.innerHTML = "";
      const details = [
        ["今回獲得EXP", currentQuest.exp],
        ["今回獲得G", currentQuest.gold],
        ["現在Lv", `Lv.${levelInfo.level}`],
        ["次Lvまで", levelInfo.nextExp === 0 ? "MAX" : `${levelInfo.nextExp}EXP`],
        ["ランク", rank],
        ["称号", currentQuest.kind === awakeningKey && levelInfo.level >= 100 ? "N2単語王" : getAdventurerTitle(levelInfo.level)]
      ];
      details.forEach(([label, value]) => {
        const item = document.createElement("div");
        item.className = "result-stat";
        const labelEl = document.createElement("span");
        labelEl.className = "result-stat-label";
        labelEl.textContent = label;
        const valueEl = document.createElement("span");
        valueEl.className = "result-stat-value";
        valueEl.textContent = value;
        item.append(labelEl, valueEl);
        gameResultDetails.appendChild(item);
      });
    }

    function renderUnlockMessages(messages) {
      unlockList.innerHTML = "";
      messages.forEach((message) => {
        const item = document.createElement("div");
        item.className = "unlock-item";
        item.textContent = message;
        unlockList.appendChild(item);
      });
    }

    function renderAnswerHistory() {
      historyGrid.innerHTML = "";
      answerHistory.forEach((item) => {
        const card = document.createElement("article");
        card.className = `history-card ${item.isCorrect ? "correct" : "wrong"}`;

        const header = document.createElement("div");
        header.className = "history-card-header";
        const number = document.createElement("span");
        number.className = "history-number";
        number.textContent = `問題 ${item.number}`;
        const status = document.createElement("span");
        status.className = "history-status";
        status.textContent = item.finalResult || (item.isCorrect ? "正解" : "不正解");

        const term = document.createElement("p");
        term.className = "history-term";
        term.textContent = item.japanese;
        const furigana = document.createElement("p");
        furigana.className = "history-furigana";
        furigana.textContent = item.furigana;

        header.append(number, status);
        card.append(header, term, furigana);
        card.append(createHistoryRow("自分の答え", item.selectedAnswer));
        card.append(createHistoryRow("正解", item.correctAnswer));
        card.append(createHistoryRow("ミス回数", `${item.missCount || 0}回`));
        card.append(createHistoryRow("最終結果", item.finalResult || (item.isCorrect ? "正解" : "不正解")));
        historyGrid.appendChild(card);
      });
    }

    function createHistoryRow(labelText, valueText) {
      const row = document.createElement("div");
      row.className = "history-row";
      const label = document.createElement("span");
      label.className = "history-label";
      label.textContent = labelText;
      const value = document.createElement("span");
      value.className = "history-value";
      value.textContent = valueText;
      row.append(label, value);
      return row;
    }

    function resetProgressData() {
      const message = "本当に全ての進行データをリセットしますか？\nEXP、G、Lv、星、ステージ解放、難易度解放、総合ダンジョン、魔王覚醒の進行状況が削除されます。\nこの操作は取り消せません。";
      if (!window.confirm(message)) {
        return;
      }
      try {
        localStorage.removeItem(progressStorageKey);
        localStorage.removeItem(legacyStorageKey);
      } catch (error) {
        console.warn("進行度データの削除に失敗しました", error);
      }
      clearRunState();
      playSfx("reset");
      gameState = createDefaultState();
      saveGameState();
      closeNormalMenu();
      renderSetSelection("保存データをリセットしました");
    }

    function exportSaveData() {
      const payload = {
        version: saveExportVersion,
        app: "N2単語ダンジョンクエスト",
        exportedAt: new Date().toISOString(),
        progress: normalizeGameState(gameState)
      };
      const text = JSON.stringify(payload, null, 2);
      saveDataBox.value = text;
      saveDataBox.focus();
      saveDataBox.select();
      saveDataMessage.textContent = "セーブデータを表示しました。コピーして別ブラウザへ移せます。";
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
          saveDataMessage.textContent = "セーブデータをコピーしました。";
        }).catch(() => {
          saveDataMessage.textContent = "コピーできない場合は、表示されたJSONを手動でコピーしてください。";
        });
      }
    }

    function importSaveData() {
      const raw = saveDataBox.value.trim();
      if (!raw) {
        saveDataMessage.textContent = "読み込むJSONを貼り付けてください。";
        return;
      }

      let parsed;
      try {
        parsed = JSON.parse(raw);
      } catch (error) {
        saveDataMessage.textContent = "JSONの形式が壊れています。保存データは変更していません。";
        return;
      }

      const candidate = parsed.progress || parsed.gameState || parsed;
      if (!candidate || typeof candidate !== "object" || !candidate.stages || typeof candidate.totalExp === "undefined") {
        saveDataMessage.textContent = "N2ダンジョンの進行データとして読み込めません。";
        return;
      }

      if (!window.confirm("貼り付けたセーブデータで現在の進行度を上書きしますか？")) {
        saveDataMessage.textContent = "読み込みをキャンセルしました。";
        return;
      }

      gameState = normalizeGameState(candidate);
      saveGameState();
      clearRunState();
      closeNormalMenu();
      renderSetSelection("セーブデータを読み込みました");
    }

    });

    if ("serviceWorker" in navigator && window.location.protocol !== "file:") {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    }

    function initializeApp() {
      syncSoundControls();
      pendingRunState = loadRunState();
      if (pendingRunState) {
        renderSetSelection();
        showResumeRunPrompt(pendingRunState);
        return;
      }
      handleRoute();
    }

    window.addEventListener("popstate", handleRoute);
    initializeApp();
  </script>
</body>
</html>
